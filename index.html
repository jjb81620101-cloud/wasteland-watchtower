<script>
(()=>{'use strict';
const KEY='wasteland-watchtower-v4',LEGACY='wasteland-watchtower-v3',$=s=>document.querySelector(s),game=$('#game'),toast=$('#toast'),modal=$('#modal');
const heroes=[['ash','艾許','C','巡防員','🧥',18],['mei','梅','C','醫護','🩹',16],['bruno','布魯諾','R','拾荒客','🧰',24],['lune','露恩','R','斥候','🔭',27],['gale','蓋爾','R','槍手','🔫',29],['noa','諾亞','R','技師','🔧',23],['rhea','瑞亞','SR','塔台長','📡',38],['moth','莫絲','SR','暗號員','📻',35],['taro','太郎','SR','破門者','🪓',42],['vivi','薇薇','SR','藥師','⚗',36],['iris','伊芮絲','SSR','風暴使','⚡',55],['rex','雷克斯','SSR','邊境王','🦾',52]].map(([id,name,rarity,role,icon,attack])=>({id,name,rarity,role,icon,attack}));
const byId=Object.fromEntries(heroes.map(h=>[h.id,h]));
const buildings={tower:{name:'廣播塔',icon:'📡',desc:'擴大頻道，增加訊號罐產出。',base:130,effect:l=>`訊號罐 +${10+(l-1)*9}%`},yard:{name:'回收場',icon:'⚙',desc:'拆解廢鐵，提升每秒補給。',base:110,effect:l=>`廢鐵 +${12+(l-1)*12}%`},bunker:{name:'庇護所',icon:'⛺',desc:'加固防線，提升守塔核心耐久。',base:145,effect:l=>`核心耐久 +${7+(l-1)*6}%`},forge:{name:'野戰工坊',icon:'🔨',desc:'加工戰利品，提升關卡結算。',base:160,effect:l=>`戰利品 +${8+(l-1)*7}%`}};
const stages=Array.from({length:30},(_,i)=>{const no=i+1,boss=no%5===0,names=['裂谷入口','乾涸公路','避難列車','鹽塵平原','無線電墓園','廢棄水廠'];return{no,boss,name:boss?`首領・${['鐵面獵犬','鹽地巨像','裂齒車隊','訊號收割者','荒原督軍','黑塔之眼'][Math.floor(i/5)]}`:`第 ${String(no).padStart(2,'0')} 區・${names[i%names.length]}`,need:82+no*47+(boss?90:0),scrap:65+no*24,cells:14+no*6,beacon:3+Math.floor(no/3)}});
const blankTactical=()=>({phase:'briefing',wave:0,spawned:0,total:0,spawnAt:0,enemySeq:0,enemies:[],slots:[null,null,null],selected:null,core:100,energy:3,slowUntil:0,flash:0,log:['防線待命：選取守夜人，再點擊對應防守位。']});
function fresh(){return{v:4,tab:'base',scrap:760,cells:155,beacon:200,chapter:1,buildings:{tower:1,yard:1,bunker:1,forge:1},owned:{ash:{lv:5,star:1,frag:0},mei:{lv:5,star:1,frag:0},bruno:{lv:4,star:1,frag:0}},team:['ash','mei','bruno'],idleAt:Date.now()-150000,chestAt:Date.now()-210000,lastDraw:[],tactical:blankTactical()}}
function sane(raw){const base=fresh();if(!raw||![3,4].includes(raw.v)||typeof raw!=='object')return base;const out={...base,...raw,v:4,buildings:{...base.buildings,...raw.buildings},owned:raw.owned&&typeof raw.owned==='object'?raw.owned:base.owned,tactical:blankTactical()};for(const key of Object.keys(buildings))out.buildings[key]=Math.max(1,Math.min(99,Number(out.buildings[key])||1));for(const [id,val] of Object.entries(out.owned)){if(!byId[id]||!val||typeof val!=='object')delete out.owned[id];else out.owned[id]={lv:Math.max(1,Math.min(99,Number(val.lv)||1)),star:Math.max(1,Math.min(10,Number(val.star)||1)),frag:Math.max(0,Number(val.frag)||0)}}out.team=Array.isArray(raw.team)?raw.team.filter(id=>out.owned[id]&&byId[id]).slice(0,3):[];if(!out.team.length)out.team=Object.keys(out.owned).slice(0,3);out.chapter=Math.max(1,Math.min(30,Number(out.chapter)||1));for(const key of ['scrap','cells','beacon'])out[key]=Math.max(0,Number(out[key])||0);out.idleAt=Number(out.idleAt)||Date.now();out.chestAt=Number(out.chestAt)||Date.now();out.lastDraw=Array.isArray(out.lastDraw)?out.lastDraw.filter(x=>byId[x.id]).slice(0,10):[];return out}
let S;try{S=sane(JSON.parse(localStorage.getItem(KEY)||localStorage.getItem(LEGACY)))}catch{S=fresh()}function save(){try{localStorage.setItem(KEY,JSON.stringify({...S,tactical:blankTactical()}))}catch{announce('存檔空間暫時不可用，遊戲仍可繼續。')}}
const fmt=n=>Math.floor(n).toLocaleString('zh-Hant'),level=id=>S.owned[id]?.lv||1,stars=id=>S.owned[id]?.star||1,stage=()=>stages[S.chapter-1];
function unitPower(id){const h=byId[id];return Math.floor(h.attack*(1+(level(id)-1)*.16)*(1+(stars(id)-1)*.18))}function power(){return Math.floor(S.team.reduce((sum,id)=>sum+unitPower(id),0)*(1+(S.buildings.bunker-1)*.04))}function rates(){return{scrap:.42*(1+(S.buildings.yard-1)*.12),cells:.11*(1+(S.buildings.bunker-1)*.04),beacon:.027*(1+(S.buildings.tower-1)*.1)}}function idle(){const sec=Math.min(8*3600,Math.max(0,(Date.now()-S.idleAt)/1000)),r=rates();return{sec,scrap:Math.floor(sec*r.scrap),cells:Math.floor(sec*r.cells),beacon:Math.floor(sec*r.beacon)}}function cost(k){return Math.floor(buildings[k].base*Math.pow(1.48,S.buildings[k]-1))}function heroCost(id){return Math.floor(48*Math.pow(1.32,level(id)-1))}function starCost(id){return 22+stars(id)*22}function announce(text){toast.textContent=text;toast.classList.add('show');clearTimeout(announce.timer);announce.timer=setTimeout(()=>toast.classList.remove('show'),2600)}
function header(){return `<header class="topbar"><div class="brandline"><span class="seal"><i>⌁</i></span><div class="brand"><b>廢土守夜站</b><small>OUTPOST // FREQUENCY 88.7</small></div></div><div class="chapter">戰力 ${fmt(power())}<br><small>區域 ${S.chapter}/30</small></div></header><div class="resources"><div class="resource"><small>廢鐵</small><b>▰ ${fmt(S.scrap)}</b></div><div class="resource"><small>電池</small><b>▱ ${fmt(S.cells)}</b></div><div class="resource"><small>訊號罐</small><b>◉ ${fmt(S.beacon)}</b></div></div>`}
function baseView(){const r=idle(),wait=Math.max(0,180-(Date.now()-S.chestAt)/1000),ready=wait===0;return `<section class="view ${S.tab==='base'?'active':''}"><section class="signal-hero"><div class="signal-copy"><div class="label">BROADCAST ONLINE</div><h1>今晚，讓更多人聽見。</h1><p>掃描荒原頻段，把倖存者帶回有燈的地方。</p></div><div class="tower"><i class="mast"></i><i class="lamp"></i></div><div class="radar"></div><div class="frequency">${Array.from({length:42},(_,i)=>`<i style="height:${5+(i*17%16)}px"></i>`).join('')}</div></section><section class="panel claim"><div class="panel-head"><div><div class="label">離線補給</div><b>塔台已收集 ${Math.floor(r.sec/60)} 分鐘</b></div><span class="utility">MAX 08:00:00</span></div><div class="rewardline"><span>▰ ${fmt(r.scrap)}　▱ ${fmt(r.cells)}　◉ ${fmt(r.beacon)}</span></div><button class="button primary wide" data-act="idle" ${r.sec<2?'disabled':''}>領取補給</button></section><section class="panel"><div class="panel-head"><div><div class="label">例行投遞</div><b>${ready?'補給箱已抵達':'下一批補給正在途中'}</b></div><span class="utility">${ready?'READY':`${Math.ceil(wait/60)} MIN`}</span></div><button class="button green wide" data-act="chest" ${ready?'':'disabled'}>${ready?'開啟補給箱':'等待訊號車'}</button></section><section class="panel"><div class="panel-head"><div><b>主城設施</b><span class="utility">UPGRADE WHEN READY</span></div><div class="buildings">${Object.entries(buildings).map(([key,b])=>`<article class="building"><span class="emoji">${b.icon}</span><b>${b.name}　Lv.${S.buildings[key]}</b><small>${b.desc}</small><span class="effect">${b.effect(S.buildings[key])}</span><button class="button" data-act="building" data-id="${key}" ${S.scrap<cost(key)?'disabled':''}>升級 ▰ ${fmt(cost(key))}</button></article>`).join('')}</div></section><p class="base-tip">提示：庇護所能提高防線核心耐久；回收場能加快補給。</p><button class="reset" data-act="reset">重置本機存檔</button></section>`}
function enemyMarkup(e){const hp=Math.max(0,Math.round(e.hp/e.max*100));return `<span class="enemy ${e.kind} ${Date.now()<S.tactical.slowUntil?'slow':''}" style="bottom:${36+Math.min(76,e.pos*76)}%" aria-label="入侵者，生命 ${hp}%">${e.kind==='ravager'?'✹':e.kind==='scout'?'⊘':'☣'}<em><i style="width:${hp}%"></i></em></span>`}
function campaignView(){const t=S.tactical,s=stage(),occupied=new Set(t.slots.filter(Boolean)),phaseText=t.phase==='live'?'交戰中':t.phase==='breach'?'核心遭突破':'待命';const startDisabled=t.phase==='live'||t.phase==='breach'||!t.slots.some(Boolean);return `<section class="view ${S.tab==='campaign'?'active':''}"><section class="battle-console"><header class="battle-header"><div class="label">MANUAL TOWER DEFENSE // v4</div><h1 class="stage-title">${s.name}</h1><p class="sub">每一波由你決定何時開火、誰守哪一條路，以及何時把頻道能量打出去。</p><div class="combat-status"><span>波次 ${t.wave}/3　${phaseText}</span><span class="${t.core>35?'core-readout':'danger-readout'}">塔芯 ${Math.max(0,t.core)}%</span></div></header><div class="battlefield" aria-label="三路手動塔防戰場"><div class="lanes">${[0,1,2].map(lane=>`<div class="lane"><span class="lane-label">${['西','中','東'][lane]}側</span><span class="range-ring"></span>${t.enemies.filter(e=>e.lane===lane).map(enemyMarkup).join('')}${t.flash?'<span class="impact">⌁</span>':''}<button class="pad ${t.slots[lane]?'occupied':''} ${t.selected&&t.slots[lane]===t.selected?'selected':''}" data-act="deploy" data-slot="${lane}" aria-label="${['西','中','東'][lane]}側防守位">${t.slots[lane]?`${byId[t.slots[lane]].icon}<small>${byId[t.slots[lane]].name}</small>`:'部署'}</button></div>`).join('')}</div><div class="tower-core">廣播塔芯 <span class="core-bar"><i style="width:${Math.max(0,t.core)}%"></i></span> ${Math.max(0,t.core)}%</div></div><section class="deployment"><div class="deployment-head"><div><b>部署名單</b><span class="utility">選取後，點防守位</span></div><span class="utility">${t.slots.filter(Boolean).length}/3</span></div><div class="deploy-roster">${S.team.map(id=>`<button class="deploy-card rarity-${byId[id].rarity} ${t.selected===id?'selected':''}" data-act="select" data-id="${id}" ${occupied.has(id)&&t.selected!==id?'disabled':''}><span>${byId[id].icon}</span> ${byId[id].name}<small>火力 ${unitPower(id)} ${occupied.has(id)?'・已部署':''}</small></button>`).join('')}</div><p class="combat-instructions"><b>操作：</b>選人 → 點防守位；交戰中可重新部署。塔芯歸零即撤退。</p></section><section class="tactical-controls"><button class="button rust" data-act="wave" ${startDisabled}>${t.phase==='live'?'交戰中…':t.wave>=3?'波次已清除':'發射誘餌，開始下一波'}<b>${t.phase==='briefing'?'需要至少 1 名守夜人':'手動啟動'}</b></button><button class="button" data-act="pulse" ${t.phase!=='live'||t.energy<1?'disabled':''}>訊號脈衝　◉ 1<b>全場傷害＋短暫減速</b></button><button class="button primary" data-act="flare" ${t.phase!=='live'||t.energy<2?'disabled':''}>照明彈　◉ 2<b>強制掃清最近威脅</b></button><button class="button green" data-act="repair" ${t.phase!=='live'||S.cells<14||t.core>=100?'disabled':''}>補修塔芯　▱ 14<b>回復 18% 耐久</b></button></section></section><section class="panel"><div class="panel-head"><div><b>電台紀錄</b><span class="utility">LIVE FEED</span></div><span class="utility">能量 ${t.energy}/3</span></div><ul class="wave-log">${t.log.slice(-3).map(x=>`<li>${x}</li>`).join('')}</ul></section><section class="panel"><div class="panel-head"><b>附近關卡</b><span class="utility">${S.chapter}/30</span></div><div class="stages">${stages.slice(Math.max(0,S.chapter-3),Math.min(30,S.chapter+2)).map(x=>`<div class="stage-row ${x.no===S.chapter?'current':x.no<S.chapter?'done':''}"><span>${x.no<S.chapter?'✓':x.no===S.chapter?'▶':'○'} ${x.name}</span><b>▰ ${x.scrap}</b></div>`).join('')}</div></section></section>`}
function heroCard(id){const h=byId[id],o=S.owned[id],inTeam=S.team.includes(id),hc=heroCost(id),sc=starCost(id),atk=unitPower(id);return `<article class="hero rarity-${h.rarity}"><div class="portrait">${h.icon}</div><div><h3>${h.name} <span class="utility">${h.rarity}・${h.role}</span></h3><div class="meta">Lv.${o.lv}　★${o.star}　戰力 ${atk}</div><div class="meta">碎片 ${o.frag}/${sc}</div></div><div class="actions"><button class="button" data-act="team" data-id="${id}">${inTeam?'撤下':'上陣'}</button><button class="button" data-act="hero" data-id="${id}" ${S.scrap<hc?'disabled':''}>升級 ${fmt(hc)}</button><button class="button" data-act="star" data-id="${id}" ${o.frag<sc?'disabled':''}>升星 ${sc}</button></div></article>`}
function heroesView(){const owned=Object.keys(S.owned).sort((a,b)=>heroes.indexOf(byId[b])-heroes.indexOf(byId[a]));return `<section class="view ${S.tab==='heroes'?'active':''}"><section class="panel"><div class="label">WATCH CREW</div><h1 class="stage-title">守住三個位置。</h1><p class="sub">上陣者可部署至西、中、東三條防線；在防線頁選取人員後點擊位置。</p><div class="team-strip">${S.team.map(id=>`<span class="chip rarity-${byId[id].rarity}">${byId[id].icon} ${byId[id].name} Lv.${level(id)}</span>`).join('')||'<span class="utility">尚未上陣</span>'}</div></section><section class="panel"><div class="panel-head"><b>已接入頻道的倖存者</b><span class="utility">${owned.length}/12</span></div><div class="heroes">${owned.map(heroCard).join('')}</div></section></section>`}
function summonView(){return `<section class="view ${S.tab==='summon'?'active':''}"><section class="summon-banner"><div class="label">OPEN FREQUENCY</div><h1>把信號送得更遠。</h1><p class="sub">新的頻率可能帶來可靠同伴，也可能只是雜訊。十連廣播保證 R 以上。</p><div class="summon-buttons"><button class="button" data-act="draw" data-count="1" ${S.beacon<50?'disabled':''}>單次接收<br><small>◉ 50</small></button><button class="button primary" data-act="draw" data-count="10" ${S.beacon<450?'disabled':''}>十次廣播<br><small>◉ 450</small></button></div></section><section class="panel"><div class="panel-head"><b>最近接收結果</b><span class="utility">${S.lastDraw.length?'NEW SIGNAL':'NO SIGNAL'}</span></div>${S.lastDraw.length?`<div class="draws">${S.lastDraw.map(x=>`<div class="draw rarity-${x.rarity}"><div class="portrait">${x.icon}</div><b>${x.name}</b><br>${x.duplicate?'碎片':'加入'}</div>`).join('')}</div>`:'<p class="sub">使用廣播塔召喚第一批倖存者。</p>'}</section></section>`}
function render(){game.innerHTML=header()+`<div class="screen">${baseView()}${campaignView()}${heroesView()}${summonView()}</div>`;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===S.tab));}
function loot(title,items,copy=''){modal.innerHTML=`<section class="modal-box"><div class="label">${copy||'TRANSMISSION COMPLETE'}</div><h2>${title}</h2><div class="loot">${items.map(i=>`<span>${i}</span>`).join('')}</div><button class="button primary" data-act="close">確認收下</button></section>`;modal.hidden=false}
function claimIdle(){const r=idle();if(r.sec<2)return;S.scrap+=r.scrap;S.cells+=r.cells;S.beacon+=r.beacon;S.idleAt=Date.now();save();render();loot('補給已入庫',[`▰ ${fmt(r.scrap)}`,`▱ ${fmt(r.cells)}`,`◉ ${fmt(r.beacon)}`],'OFFLINE SUPPLY')}function chest(){if(Date.now()-S.chestAt<180000)return;const m=1+(S.buildings.forge-1)*.07,a=Math.floor(110*m),c=Math.floor(26*m),b=12+S.buildings.tower*2;S.scrap+=a;S.cells+=c;S.beacon+=b;S.chestAt=Date.now();save();render();loot('例行投遞',[`▰ ${a}`,`▱ ${c}`,`◉ ${b}`],'SUPPLY DROP')}function upgradeBuilding(key){const c=cost(key);if(S.scrap<c)return;S.scrap-=c;S.buildings[key]++;save();render();announce(`${buildings[key].name} 升至 Lv.${S.buildings[key]}！`)}
function team(id){if(S.team.includes(id)){if(S.team.length===1){announce('至少需要一名守夜人。');return}S.team=S.team.filter(x=>x!==id);S.tactical=blankTactical();announce(`${byId[id].name} 已撤下。`)}else if(S.team.length>=3)announce('小隊已滿，請先撤下一人。');else{S.team.push(id);S.tactical=blankTactical();announce(`${byId[id].name} 已上陣。`)}save();render()}function upgradeHero(id){const c=heroCost(id),o=S.owned[id];if(S.scrap<c)return;S.scrap-=c;o.lv++;save();render();announce(`${byId[id].name} 升至 Lv.${o.lv}！`)}function star(id){const c=starCost(id),o=S.owned[id];if(o.frag<c)return;o.frag-=c;o.star++;save();render();announce(`${byId[id].name} 升為 ★${o.star}！`)}
function pick(){const roll=Math.random()*100,pool=roll<3?heroes.filter(h=>h.rarity==='SSR'):roll<18?heroes.filter(h=>h.rarity==='SR'):roll<57?heroes.filter(h=>h.rarity==='R'):heroes.filter(h=>h.rarity==='C');return pool[Math.floor(Math.random()*pool.length)]}function draw(count){const costDraw=count===10?450:50;if(S.beacon<costDraw)return;S.beacon-=costDraw;const got=[];for(let i=0;i<count;i++){const h=i===9&&count===10?heroes.filter(x=>x.rarity!=='C')[Math.floor(Math.random()*10)]:pick(),old=S.owned[h.id],duplicate=!!old;if(old)old.frag+=h.rarity==='SSR'?60:h.rarity==='SR'?35:h.rarity==='R'?22:15;else S.owned[h.id]={lv:1,star:1,frag:0};got.push({...h,duplicate})}S.lastDraw=got;save();render();modal.innerHTML=`<section class="modal-box"><div class="label">SIGNAL RECEIVED</div><h2>${count===10?'十連廣播完成':'頻道接收完成'}</h2><div class="draws">${got.map(x=>`<div class="draw rarity-${x.rarity}"><div class="portrait">${x.icon}</div><b>${x.name}</b><br>${x.rarity}<br>${x.duplicate?'＋碎片':'加入小隊'}</div>`).join('')}</div><button class="button primary wide" data-act="close">確認結果</button></section>`;modal.hidden=false}
function tacticalLog(text){S.tactical.log.push(text);S.tactical.log=S.tactical.log.slice(-6)}function selectDefender(id){if(S.tactical.slots.includes(id)&&S.tactical.selected!==id){announce('該守夜人已在防守位。');return}S.tactical.selected=S.tactical.selected===id?null:id;render()}function deploy(slot){const t=S.tactical;if(!t.selected){announce('先在部署名單選擇一名守夜人。');return}const existing=t.slots.indexOf(t.selected);if(existing>-1)t.slots[existing]=null;t.slots[slot]=t.selected;tacticalLog(`${byId[t.selected].name} 接管${['西','中','東'][slot]}側防線。`);render()}
function beginWave(){const t=S.tactical;if(t.phase==='live'||t.phase==='breach'||!t.slots.some(Boolean))return;t.phase='live';t.wave++;t.spawned=0;t.total=5+t.wave+(stage().boss&&t.wave===3?2:0);t.spawnAt=Date.now();t.energy=Math.min(3,t.energy+1);tacticalLog(`第 ${t.wave} 波：誘餌信號已發射，${t.total} 個熱源回應。`);render()}
function spawnEnemy(){const t=S.tactical,s=stage(),n=t.spawned++;const boss=stage().boss&&t.wave===3&&n===t.total-1,ravager=boss||Math.random()<.25;const max=Math.round((s.need*.34+t.wave*13)*(ravager?1.65:1));t.enemies.push({id:++t.enemySeq,lane:Math.floor(Math.random()*3),pos:0,hp:max,max,kind:ravager?'ravager':Math.random()<.4?'scout':'drifter',damage:ravager?16:8,speed:ravager?.09:.12,bounty:ravager?2:1})}
function resolveTactical(){const t=S.tactical,s=stage(),m=1+(S.buildings.forge-1)*.07,a=Math.floor(s.scrap*m),c=Math.floor(s.cells*m),be=s.beacon;S.scrap+=a;S.cells+=c;S.beacon+=be;const last=S.chapter===30;if(!last)S.chapter++;S.tactical=blankTactical();save();render();loot(last?'黑塔已靜默':'防線守住了！',[`▰ ${a}`,`▱ ${c}`,`◉ ${be}`],'MANUAL DEFENSE CLEARED')}
function retreat(){const s=stage(),a=Math.floor(s.scrap*.18);S.scrap+=a;S.tactical=blankTactical();save();render();loot('塔芯熄火，暫時撤退',[`▰ ${a}`],'CORE BREACHED')}
function pulse(strong){const t=S.tactical,cost=strong?2:1;if(t.phase!=='live'||t.energy<cost)return;t.energy-=cost;t.flash=Date.now()+360;const damage=strong?Math.max(54,Math.floor(power()*.66)):Math.max(20,Math.floor(power()*.26));let hits=0;t.enemies.forEach(e=>{if(strong||e.pos>.32){e.hp-=damage;hits++}});if(!strong)t.slowUntil=Date.now()+2500;tacticalLog(strong?`照明彈落下，掃過 ${hits} 個威脅。`:`訊號脈衝擾亂 ${hits} 個熱源。`);render()}
function repair(){const t=S.tactical;if(t.phase!=='live'||S.cells<14||t.core>=100)return;S.cells-=14;t.core=Math.min(100,t.core+18);tacticalLog('技師補上塔芯護板，耐久 +18%。');render()}
function tickBattle(){const t=S.tactical;if(t.phase!=='live')return;const now=Date.now();if(t.spawned<t.total&&now>=t.spawnAt){spawnEnemy();t.spawnAt=now+670}for(let lane=0;lane<3;lane++){const id=t.slots[lane];if(!id)continue;const targets=t.enemies.filter(e=>e.lane===lane).sort((a,b)=>b.pos-a.pos);if(targets.length){const target=targets[0],dmg=Math.max(5,Math.round(unitPower(id)*.45));target.hp-=dmg;if(target.hp<=0){S.cells+=target.bounty;t.energy=Math.min(3,t.energy+(target.kind==='ravager'?1:0));tacticalLog(`${byId[id].name} 在${['西','中','東'][lane]}側清除熱源。`)}}}t.enemies=t.enemies.filter(e=>e.hp>0);const slowed=now<t.slowUntil;t.enemies.forEach(e=>{e.pos+=e.speed*(slowed?.35:1);if(e.pos>=1){t.core-=e.damage;tacticalLog(`${['西','中','東'][e.lane]}側突破，塔芯 -${e.damage}%。`);e.hp=0}});t.enemies=t.enemies.filter(e=>e.hp>0);if(t.core<=0){t.core=0;t.phase='breach';render();setTimeout(retreat,420);return}if(t.spawned===t.total&&!t.enemies.length){if(t.wave>=3){t.phase='clear';render();setTimeout(resolveTactical,380)}else{t.phase='briefing';t.energy=Math.min(3,t.energy+1);tacticalLog(`第 ${t.wave} 波淨空。調整部署後，再發射下一段誘餌。`);render()}}else render()}
function reset(){modal.innerHTML='<section class="modal-box"><div class="label">DANGER ZONE</div><h2>重置本機存檔？</h2><p class="sub">這會清除目前的角色、資源與關卡進度，無法復原。</p><button class="button rust" data-act="confirmReset">確定重置</button><button class="button" data-act="close">取消</button></section>';modal.hidden=false}
document.addEventListener('click',e=>{const b=e.target.closest('button');if(!b||b.disabled)return;if(b.dataset.tab){S.tab=b.dataset.tab;save();render();return}const a=b.dataset.act;if(a==='idle')claimIdle();else if(a==='chest')chest();else if(a==='building')upgradeBuilding(b.dataset.id);else if(a==='team')team(b.dataset.id);else if(a==='hero')upgradeHero(b.dataset.id);else if(a==='star')star(b.dataset.id);else if(a==='draw')draw(Number(b.dataset.count));else if(a==='select')selectDefender(b.dataset.id);else if(a==='deploy')deploy(Number(b.dataset.slot));else if(a==='wave')beginWave();else if(a==='pulse')pulse(false);else if(a==='flare')pulse(true);else if(a==='repair')repair();else if(a==='reset')reset();else if(a==='confirmReset'){try{localStorage.removeItem(KEY);localStorage.removeItem(LEGACY)}catch{}S=fresh();save();modal.hidden=true;render();announce('新的頻率已建立。')}else if(a==='close')modal.hidden=true;});
window.__watchtower={reset:()=>{S=fresh();save();render()},state:()=>JSON.parse(JSON.stringify(S)),key:KEY,deploy:(hero,lane)=>{S.tactical.selected=hero;deploy(lane)},startWave:beginWave,tick:tickBattle};render();setInterval(tickBattle,500);window.addEventListener('beforeunload',save);
})();
</script>
</body>
</html>

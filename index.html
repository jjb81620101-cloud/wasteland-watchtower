<title>廢土守夜站｜廣播塔</title>
<style>
:root{--ash:#171713;--coal:#24231d;--plate:#302e25;--line:#625d4b;--paper:#e7d7b0;--muted:#aaa38e;--yellow:#f2bd45;--rust:#a64b32;--green:#9abd6c;--blue:#79b7c8;--white:#fff8e6;--shadow:#090907}*{box-sizing:border-box}html{background:#0d0d0b}body{margin:0;background:radial-gradient(circle at 50% -10%,#403b2a 0,#171713 43%,#0d0d0b 100%);color:var(--paper);font:15px/1.35 "Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;min-width:320px}button{font:inherit}button:focus-visible{outline:2px solid var(--yellow);outline-offset:2px}.game{width:min(100%,430px);min-height:100vh;margin:auto;background:linear-gradient(105deg,#ffffff03 0 1px,transparent 1px 6px),var(--ash);box-shadow:0 0 0 1px #504b3c,0 24px 80px #000;position:relative;overflow:hidden;padding-bottom:88px}.topbar{height:63px;padding:11px 14px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:#1c1b16}.brandline{display:flex;gap:8px;align-items:center}.seal{width:30px;height:30px;display:grid;place-items:center;border:1px solid var(--yellow);color:var(--yellow);font-size:16px;transform:rotate(45deg)}.seal i{font-style:normal;transform:rotate(-45deg)}.brand b{display:block;letter-spacing:.09em;font-size:14px}.brand small,.utility{display:block;color:var(--muted);font:10px/1.2 ui-monospace,Consolas,monospace;letter-spacing:.08em}.chapter{text-align:right;color:var(--yellow);font:800 12px ui-monospace,Consolas,monospace}.resources{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-bottom:1px solid var(--line)}.resource{background:#24231d;padding:8px 11px}.resource small{display:block;color:var(--muted);font-size:10px}.resource b{display:block;color:var(--white);font:800 14px ui-monospace,Consolas,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.screen{padding:12px}.view{display:none}.view.active{display:block;animation:arrive .2s ease-out}@keyframes arrive{from{opacity:.3;transform:translateY(4px)}to{opacity:1;transform:none}}.panel{background:var(--coal);border:1px solid var(--line);box-shadow:inset 0 1px #ffffff09,0 3px 0 var(--shadow);padding:12px;margin-bottom:11px}.panel-head{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:9px}.label{color:var(--yellow);font:800 10px ui-monospace,Consolas,monospace;letter-spacing:.12em}.sub{color:var(--muted);font-size:12px;margin:5px 0 0}.signal-hero{min-height:238px;position:relative;overflow:hidden;padding:16px;background:linear-gradient(135deg,#343326,#25251d 58%,#3d2c20);border:1px solid #81724c;box-shadow:inset 0 1px #ffffff1c,0 3px 0 var(--shadow)}.signal-copy{position:relative;z-index:3;width:52%}.signal-copy h1{font-size:25px;line-height:1.08;margin:6px 0 0;letter-spacing:.02em}.signal-copy p{color:#cac1a5;font-size:12px;margin:9px 0}.tower{position:absolute;right:28px;bottom:17px;width:120px;height:190px;z-index:2}.mast{position:absolute;bottom:0;left:52px;width:7px;height:139px;background:linear-gradient(90deg,#aaa184,#504c3d);clip-path:polygon(35% 0,65% 0,100% 100%,0 100%)}.mast:before{content:"";position:absolute;top:29px;left:-35px;width:77px;height:2px;background:#a49b7f;transform:rotate(-15deg);box-shadow:0 36px 0 #a49b7f}.lamp{position:absolute;top:37px;left:52px;width:15px;height:15px;border-radius:50%;background:var(--yellow);box-shadow:0 0 0 5px #f2bd4522,0 0 20px var(--yellow)}.radar{position:absolute;right:-36px;bottom:-37px;width:205px;height:205px;border:1px solid #f2bd4570;border-radius:50%;background:repeating-radial-gradient(circle,#f2bd4500 0 27px,#f2bd4524 28px 29px)}.radar:before{content:"";position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 225deg,transparent 0 72%,#f2bd454d 79%,transparent 84%);animation:sweep 2.6s linear infinite}.radar:after{content:"";position:absolute;top:50%;left:50%;width:4px;height:4px;border-radius:50%;background:var(--yellow);transform:translate(-50%,-50%);box-shadow:0 0 10px var(--yellow)}@keyframes sweep{to{transform:rotate(360deg)}}.frequency{position:absolute;bottom:11px;left:15px;right:15px;height:25px;z-index:3;display:flex;gap:3px;align-items:flex-end;border-top:1px solid #f2bd4560;padding-top:5px}.frequency i{display:block;width:5px;background:var(--green);animation:pulse .85s ease-in-out infinite alternate}.frequency i:nth-child(2n){animation-delay:.2s;background:var(--yellow)}.frequency i:nth-child(3n){animation-delay:.45s;height:5px!important}@keyframes pulse{to{transform:scaleY(.4);opacity:.55}}.claim{background:linear-gradient(135deg,#433b20,#28261b);border-color:#917b3c}.rewardline{display:flex;justify-content:space-between;gap:8px;align-items:center;padding:9px 0 0}.rewardline b{font-size:13px}.rewardline span{color:var(--yellow);font:800 12px ui-monospace,Consolas,monospace}.button{border:1px solid #7b735b;color:var(--paper);background:#403d30;padding:10px 11px;min-height:42px;cursor:pointer;box-shadow:inset 0 1px #ffffff12,0 2px 0 #11110d;font-weight:800}.button:hover{background:#504b38}.button.primary{background:#896a27;border-color:var(--yellow);color:#fff6d9}.button.rust{background:#6f3427;border-color:#c76442}.button.green{background:#425035;border-color:var(--green)}.button:disabled{opacity:.42;filter:grayscale(.5);cursor:not-allowed}.wide{width:100%;margin-top:9px}.buildings{display:grid;grid-template-columns:1fr 1fr;gap:7px}.building{position:relative;min-height:145px;border:1px solid #605a47;background:#27261f;padding:10px;overflow:hidden}.building:after{content:"";position:absolute;right:-15px;bottom:-15px;width:58px;height:58px;border:1px solid #ffffff12;transform:rotate(45deg)}.building .emoji{font-size:26px;display:block;margin-bottom:3px;filter:saturate(.8)}.building b{font-size:13px}.building small{display:block;color:var(--muted);font-size:10px;min-height:29px;margin:3px 0}.building .effect{color:var(--green);font-size:10px;display:block;margin-bottom:6px}.building .button{font-size:11px;min-height:33px;padding:5px;width:100%;position:relative;z-index:1}.base-tip{font-size:11px;color:#c5b988}.combat-card{background:linear-gradient(145deg,#2f3026,#211f1a);border:1px solid #847a57;padding:13px;box-shadow:0 3px 0 var(--shadow)}.stage-title{font-size:20px;margin:3px 0}.versus{display:grid;grid-template-columns:1fr 25px 1fr;gap:6px;align-items:center;margin:13px 0}.squad,.foe{min-height:120px;padding:8px;border:1px solid #68614b;background:#1a1a15}.foe{border-color:#804735}.vs{color:var(--rust);font:900 12px ui-monospace,monospace;text-align:center}.faces{font-size:25px;letter-spacing:1px}.foe .faces{filter:saturate(.7)}.fighter-name{font-weight:800;font-size:12px;margin-top:5px}.meter{height:7px;border:1px solid #5e5947;background:#11110f;margin-top:7px;overflow:hidden}.meter i{display:block;height:100%;background:var(--green);transition:width .35s}.foe .meter i{background:var(--rust)}.battle-hint{font-size:11px;color:var(--muted);min-height:32px}.stages{display:grid;gap:6px}.stage-row{display:flex;align-items:center;justify-content:space-between;gap:8px;border-left:3px solid #575343;background:#29271f;padding:7px 8px;font-size:12px}.stage-row.current{border-color:var(--yellow);background:#37311f}.stage-row.done{border-color:var(--green)}.rarity-C{--rare:#bbb8a8}.rarity-R{--rare:var(--blue)}.rarity-SR{--rare:var(--yellow)}.rarity-SSR{--rare:#e0784f}.team-strip{display:flex;gap:5px;min-height:44px}.chip{border:1px solid var(--rare,#625d4b);padding:6px;background:#202019;font-size:11px}.heroes{display:grid;gap:7px}.hero{display:grid;grid-template-columns:48px 1fr auto;gap:8px;align-items:center;border:1px solid #605b48;border-left:3px solid var(--rare);background:#27261f;padding:8px}.portrait{width:43px;height:43px;display:grid;place-items:center;border:1px solid var(--rare);background:#38362c;font-size:21px}.hero h3{font-size:13px;margin:0}.hero .meta{font-size:10px;color:var(--muted)}.hero .actions{display:grid;gap:4px}.hero .button{font-size:10px;min-height:25px;padding:3px 5px}.summon-banner{min-height:208px;position:relative;overflow:hidden;background:linear-gradient(145deg,#382d20,#24251d);border:1px solid #917742;padding:15px}.summon-banner:before{content:"";position:absolute;right:-35px;top:15px;width:160px;height:160px;border:18px solid #f2bd4520;border-radius:50%;box-shadow:inset 0 0 35px #f2bd4520}.summon-banner h1{font-size:24px;position:relative;z-index:1;margin:5px 0}.summon-buttons{display:grid;grid-template-columns:1fr 1fr;gap:7px;position:relative;z-index:1;margin-top:16px}.draws{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.draw{background:#1e1e18;border:1px solid var(--rare);padding:5px 2px;text-align:center;font-size:9px;color:var(--rare)}.draw .portrait{width:31px;height:31px;margin:auto;border-color:var(--rare);font-size:16px}.nav{position:fixed;z-index:10;bottom:0;left:50%;transform:translateX(-50%);width:min(100%,430px);display:grid;grid-template-columns:repeat(4,1fr);padding:5px 6px calc(5px + env(safe-area-inset-bottom));background:#1c1b16;border-top:1px solid var(--line);box-shadow:0 -6px 20px #0007}.nav button{border:0;border-top:2px solid transparent;color:var(--muted);background:transparent;padding:5px 1px;min-height:53px;font-size:10px;cursor:pointer}.nav button span{font-size:19px;display:block;line-height:20px}.nav button.active{color:var(--yellow);border-color:var(--yellow)}.toast{position:fixed;z-index:30;left:50%;bottom:83px;transform:translate(-50%,12px);width:min(390px,calc(100% - 24px));background:#eee0bb;color:#28241a;border:2px solid var(--yellow);padding:10px 12px;box-shadow:0 7px 20px #000a;opacity:0;pointer-events:none;transition:.24s;font-weight:800;font-size:12px}.toast.show{opacity:1;transform:translate(-50%,0)}.modal{position:fixed;z-index:25;inset:0;background:#000b;display:grid;place-items:center;padding:16px}.modal[hidden]{display:none}.modal-box{width:min(390px,100%);max-height:88vh;overflow:auto;background:#29271f;border:1px solid #aa9665;box-shadow:0 15px 50px #000;padding:15px;text-align:center}.modal-box h2{margin:6px 0;font-size:23px}.loot{display:flex;justify-content:center;flex-wrap:wrap;gap:7px;margin:13px 0}.loot span{background:#1d1d17;border:1px solid #756d55;padding:7px;font:800 12px ui-monospace,monospace}.modal .button{margin:3px}.reset{color:#aa9980;background:none;border:0;text-decoration:underline;font-size:11px;cursor:pointer;padding:4px}@media(min-width:650px){body{padding:18px 0}.game{min-height:calc(100vh - 36px);border-radius:14px;overflow:hidden}.nav{bottom:18px;border-radius:0 0 14px 14px}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main class="game" id="game" aria-live="polite"></main>
<nav class="nav" aria-label="遊戲導覽">
<button class="active" data-tab="base"><span>⌁</span>基地</button><button data-tab="campaign"><span>⚔</span>遠征</button><button data-tab="heroes"><span>♟</span>倖存者</button><button data-tab="summon"><span>◉</span>頻道</button>
</nav>
<div class="toast" id="toast" role="status"></div>
<div class="modal" id="modal" hidden></div>
<script>
(()=>{'use strict';
const KEY='wasteland-watchtower-v3', $=s=>document.querySelector(s), game=$('#game'), toast=$('#toast'), modal=$('#modal');
const heroes=[
 ['ash','艾許','C','巡防員','🧥',18],['mei','梅','C','醫護','🩹',16],['bruno','布魯諾','R','拾荒客','🧰',24],['lune','露恩','R','斥候','🔭',27],['gale','蓋爾','R','槍手','🔫',29],['noa','諾亞','R','技師','🔧',23],['rhea','瑞亞','SR','塔台長','📡',38],['moth','莫絲','SR','暗號員','📻',35],['taro','太郎','SR','破門者','🪓',42],['vivi','薇薇','SR','藥師','⚗',36],['iris','伊芮絲','SSR','風暴使','⚡',55],['rex','雷克斯','SSR','邊境王','🦾',52]
].map(([id,name,rarity,role,icon,attack])=>({id,name,rarity,role,icon,attack}));
const byId=Object.fromEntries(heroes.map(h=>[h.id,h]));
const buildings={tower:{name:'廣播塔',icon:'📡',desc:'擴大頻道，增加訊號罐產出。',base:130,effect:l=>`訊號罐 +${10+(l-1)*9}%`},yard:{name:'回收場',icon:'⚙',desc:'拆解廢鐵，提升每秒補給。',base:110,effect:l=>`廢鐵 +${12+(l-1)*12}%`},bunker:{name:'庇護所',icon:'⛺',desc:'安置新同伴，增加小隊戰力。',base:145,effect:l=>`全隊戰力 +${7+(l-1)*6}%`},forge:{name:'野戰工坊',icon:'🔩',desc:'加工戰利品，提升關卡結算。',base:160,effect:l=>`戰利品 +${8+(l-1)*7}%`}};
const stages=Array.from({length:30},(_,i)=>{const no=i+1,boss=no%5===0,names=['裂谷入口','乾涸公路','避難列車','鹽塵平原','無線電墓園','廢棄水廠'];return{no,boss,name:boss?`首領・${['鐵面獵犬','鹽地巨像','裂齒車隊','訊號收割者','荒原督軍','黑塔之眼'][Math.floor(i/5)]}`:`第 ${String(no).padStart(2,'0')} 區・${names[i%names.length]}`,need:82+no*47+(boss?90:0),scrap:65+no*24,cells:14+no*6,beacon:3+Math.floor(no/3)}});
function fresh(){return{v:3,tab:'base',scrap:760,cells:155,beacon:200,chapter:1,buildings:{tower:1,yard:1,bunker:1,forge:1},owned:{ash:{lv:5,star:1,frag:0},mei:{lv:5,star:1,frag:0},bruno:{lv:4,star:1,frag:0}},team:['ash','mei','bruno'],idleAt:Date.now()-150000,chestAt:Date.now()-210000,lastDraw:[],battle:null};}
function sane(raw){const base=fresh();if(!raw||raw.v!==3||typeof raw!=='object')return base;const out={...base,...raw,buildings:{...base.buildings,...raw.buildings},owned:raw.owned&&typeof raw.owned==='object'?raw.owned:base.owned};for(const key of Object.keys(buildings))out.buildings[key]=Math.max(1,Math.min(99,Number(out.buildings[key])||1));for(const [id,val] of Object.entries(out.owned)){if(!byId[id]||!val||typeof val!=='object')delete out.owned[id];else out.owned[id]={lv:Math.max(1,Math.min(99,Number(val.lv)||1)),star:Math.max(1,Math.min(10,Number(val.star)||1)),frag:Math.max(0,Number(val.frag)||0)}}out.team=Array.isArray(raw.team)?raw.team.filter(id=>out.owned[id]&&byId[id]).slice(0,3):[];if(!out.team.length)out.team=Object.keys(out.owned).slice(0,3);out.chapter=Math.max(1,Math.min(30,Number(out.chapter)||1));out.scrap=Math.max(0,Number(out.scrap)||0);out.cells=Math.max(0,Number(out.cells)||0);out.beacon=Math.max(0,Number(out.beacon)||0);out.idleAt=Number(out.idleAt)||Date.now();out.chestAt=Number(out.chestAt)||Date.now();out.lastDraw=Array.isArray(out.lastDraw)?out.lastDraw.filter(x=>byId[x.id]).slice(0,10):[];out.battle=null;return out;}
let S;try{S=sane(JSON.parse(localStorage.getItem(KEY)))}catch{S=fresh()}function save(){try{localStorage.setItem(KEY,JSON.stringify({...S,battle:null}))}catch{announce('存檔空間暫時不可用，遊戲仍可繼續。')}}
const fmt=n=>Math.floor(n).toLocaleString('zh-Hant'); const level=id=>S.owned[id]?.lv||1;const stars=id=>S.owned[id]?.star||1;const stage=()=>stages[S.chapter-1];
function power(){const units=S.team.reduce((sum,id)=>{const h=byId[id];return sum+h.attack*(1+(level(id)-1)*.16)*(1+(stars(id)-1)*.18)},0);return Math.floor(units*(1+(S.buildings.bunker-1)*.07));}
function rates(){return{scrap:.42*(1+(S.buildings.yard-1)*.12),cells:.11*(1+(S.buildings.bunker-1)*.04),beacon:.027*(1+(S.buildings.tower-1)*.1)}}function idle(){const sec=Math.min(8*3600,Math.max(0,(Date.now()-S.idleAt)/1000)),r=rates();return{sec,scrap:Math.floor(sec*r.scrap),cells:Math.floor(sec*r.cells),beacon:Math.floor(sec*r.beacon)}}function cost(k){return Math.floor(buildings[k].base*Math.pow(1.48,S.buildings[k]-1))}function heroCost(id){return Math.floor(48*Math.pow(1.32,level(id)-1))}function starCost(id){return 22+stars(id)*22}
function announce(text){toast.textContent=text;toast.classList.add('show');clearTimeout(announce.timer);announce.timer=setTimeout(()=>toast.classList.remove('show'),2600)}
function header(){return `<header class="topbar"><div class="brandline"><span class="seal"><i>⌁</i></span><div class="brand"><b>廢土守夜站</b><small>OUTPOST // FREQUENCY 88.7</small></div></div><div class="chapter">戰力 ${fmt(power())}<br><small>區域 ${S.chapter}/30</small></div></header><div class="resources"><div class="resource"><small>廢鐵</small><b>▰ ${fmt(S.scrap)}</b></div><div class="resource"><small>電池</small><b>▱ ${fmt(S.cells)}</b></div><div class="resource"><small>訊號罐</small><b>◉ ${fmt(S.beacon)}</b></div></div>`}
function baseView(){const r=idle(),wait=Math.max(0,180-(Date.now()-S.chestAt)/1000),ready=wait===0;return `<section class="view ${S.tab==='base'?'active':''}"><section class="signal-hero"><div class="signal-copy"><div class="label">BROADCAST ONLINE</div><h1>今晚，讓更多人聽見。</h1><p>掃描荒原頻段，把倖存者帶回有燈的地方。</p></div><div class="tower"><i class="mast"></i><i class="lamp"></i></div><div class="radar"></div><div class="frequency">${Array.from({length:42},(_,i)=>`<i style="height:${5+(i*17%16)}px"></i>`).join('')}</div></section><section class="panel claim"><div class="panel-head"><div><div class="label">離線補給</div><b>塔台已收集 ${Math.floor(r.sec/60)} 分鐘</b></div><span class="utility">MAX 08:00:00</span></div><div class="rewardline"><span>▰ ${fmt(r.scrap)}　▱ ${fmt(r.cells)}　◉ ${fmt(r.beacon)}</span></div><button class="button primary wide" data-act="idle" ${r.sec<2?'disabled':''}>領取補給</button></section><section class="panel"><div class="panel-head"><div><div class="label">例行投遞</div><b>${ready?'補給箱已抵達':'下一批補給正在途中'}</b></div><span class="utility">${ready?'READY':`${Math.ceil(wait/60)} MIN`}</span></div><button class="button green wide" data-act="chest" ${ready?'':'disabled'}>${ready?'開啟補給箱':'等待訊號車'}</button></section><section class="panel"><div class="panel-head"><div><b>主城設施</b><span class="utility">UPGRADE WHEN READY</span></div><div class="buildings">${Object.entries(buildings).map(([key,b])=>`<article class="building"><span class="emoji">${b.icon}</span><b>${b.name}　Lv.${S.buildings[key]}</b><small>${b.desc}</small><span class="effect">${b.effect(S.buildings[key])}</span><button class="button" data-act="building" data-id="${key}" ${S.scrap<cost(key)?'disabled':''}>升級 ▰ ${fmt(cost(key))}</button></article>`).join('')}</div></section><p class="base-tip">提示：先升回收場，補給速度會明顯變快。</p><button class="reset" data-act="reset">重置本機存檔</button></section>`}
function campaignView(){const s=stage(),p=power(),ratio=Math.min(100,Math.round(p/s.need*100)),inBattle=!!S.battle;return `<section class="view ${S.tab==='campaign'?'active':''}"><section class="combat-card"><div class="label">荒原遠征 // AUTO BATTLE</div><h1 class="stage-title">${s.name}</h1><p class="sub">挑戰會消耗 2.4 秒。戰力越高，勝算越大。</p><div class="versus"><article class="squad"><span class="utility">守夜小隊 ${fmt(p)}</span><div class="faces">${S.team.map(id=>byId[id].icon).join(' ')}</div><div class="fighter-name">${S.team.map(id=>byId[id].name).join('・')}</div><div class="meter"><i style="width:${ratio}%"></i></div></article><div class="vs">VS</div><article class="foe"><span class="utility">威脅 ${fmt(s.need)}</span><div class="faces">${s.boss?'☠ 🛞':'☠ ☠ ☠'}</div><div class="fighter-name">${s.boss?'荒原首領':'掠奪巡隊'}</div><div class="meter"><i style="width:100%"></i></div></article></div><div class="battle-hint">${inBattle?'正在交火，請守住頻道…':p>=s.need?'戰力足夠，現在可以出發。':'小隊戰力不足；升級角色或強化庇護所。'}</div><button class="button rust wide" data-act="battle" ${inBattle?'disabled':''}>${inBattle?'交火中…':'挑戰關卡'}</button></section><section class="panel"><div class="panel-head"><b>附近關卡</b><span class="utility">${S.chapter}/30</span></div><div class="stages">${stages.slice(Math.max(0,S.chapter-3),Math.min(30,S.chapter+2)).map(x=>`<div class="stage-row ${x.no===S.chapter?'current':x.no<S.chapter?'done':''}"><span>${x.no<S.chapter?'✓':x.no===S.chapter?'▶':'○'} ${x.name}</span><b>▰ ${x.scrap}</b></div>`).join('')}</div></section></section>`}
function heroCard(id){const h=byId[id],o=S.owned[id],inTeam=S.team.includes(id),hc=heroCost(id),sc=starCost(id),atk=Math.floor(h.attack*(1+(o.lv-1)*.16)*(1+(o.star-1)*.18));return `<article class="hero rarity-${h.rarity}"><div class="portrait">${h.icon}</div><div><h3>${h.name} <span class="utility">${h.rarity}・${h.role}</span></h3><div class="meta">Lv.${o.lv}　★${o.star}　戰力 ${atk}</div><div class="meta">碎片 ${o.frag}/${sc}</div></div><div class="actions"><button class="button" data-act="team" data-id="${id}">${inTeam?'撤下':'上陣'}</button><button class="button" data-act="hero" data-id="${id}" ${S.scrap<hc?'disabled':''}>升級 ${fmt(hc)}</button><button class="button" data-act="star" data-id="${id}" ${o.frag<sc?'disabled':''}>升星 ${sc}</button></div></article>`}
function heroesView(){const owned=Object.keys(S.owned).sort((a,b)=>heroes.indexOf(byId[b])-heroes.indexOf(byId[a]));return `<section class="view ${S.tab==='heroes'?'active':''}"><section class="panel"><div class="label">WATCH CREW</div><h1 class="stage-title">守住三個位置。</h1><p class="sub">每位上陣者會加入小隊總戰力，最多 3 人。</p><div class="team-strip">${S.team.map(id=>`<span class="chip rarity-${byId[id].rarity}">${byId[id].icon} ${byId[id].name} Lv.${level(id)}</span>`).join('')||'<span class="utility">尚未上陣</span>'}</div></section><section class="panel"><div class="panel-head"><b>已接入頻道的倖存者</b><span class="utility">${owned.length}/12</span></div><div class="heroes">${owned.map(heroCard).join('')}</div></section></section>`}
function summonView(){return `<section class="view ${S.tab==='summon'?'active':''}"><section class="summon-banner"><div class="label">OPEN FREQUENCY</div><h1>把信號送得更遠。</h1><p class="sub">新的頻率可能帶來可靠同伴，也可能只是雜訊。十連召喚保證 R 以上。</p><div class="summon-buttons"><button class="button" data-act="draw" data-count="1" ${S.beacon<50?'disabled':''}>單次接收<br><small>◉ 50</small></button><button class="button primary" data-act="draw" data-count="10" ${S.beacon<450?'disabled':''}>十次廣播<br><small>◉ 450</small></button></div></section><section class="panel"><div class="panel-head"><b>最近接收結果</b><span class="utility">${S.lastDraw.length?'NEW SIGNAL':'NO SIGNAL'}</span></div>${S.lastDraw.length?`<div class="draws">${S.lastDraw.map(x=>`<div class="draw rarity-${x.rarity}"><div class="portrait">${x.icon}</div><b>${x.name}</b><br>${x.duplicate?'碎片':'加入'}</div>`).join('')}</div>`:'<p class="sub">使用廣播塔召喚第一批倖存者。</p>'}</section></section>`}
function render(){game.innerHTML=header()+`<div class="screen">${baseView()}${campaignView()}${heroesView()}${summonView()}</div>`;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===S.tab));}
function loot(title,items,copy=''){modal.innerHTML=`<section class="modal-box"><div class="label">${copy||'TRANSMISSION COMPLETE'}</div><h2>${title}</h2><div class="loot">${items.map(i=>`<span>${i}</span>`).join('')}</div><button class="button primary" data-act="close">確認收下</button></section>`;modal.hidden=false;}
function claimIdle(){const r=idle();if(r.sec<2)return;S.scrap+=r.scrap;S.cells+=r.cells;S.beacon+=r.beacon;S.idleAt=Date.now();save();render();loot('補給已入庫',[`▰ ${fmt(r.scrap)}`,`▱ ${fmt(r.cells)}`,`◉ ${fmt(r.beacon)}`],'OFFLINE SUPPLY')}
function chest(){if(Date.now()-S.chestAt<180000)return;const m=1+(S.buildings.forge-1)*.07,a=Math.floor(110*m),c=Math.floor(26*m),b=12+S.buildings.tower*2;S.scrap+=a;S.cells+=c;S.beacon+=b;S.chestAt=Date.now();save();render();loot('例行投遞',[`▰ ${a}`,`▱ ${c}`,`◉ ${b}`],'SUPPLY DROP')}
function upgradeBuilding(key){const c=cost(key);if(S.scrap<c)return;S.scrap-=c;S.buildings[key]++;save();render();announce(`${buildings[key].name} 升至 Lv.${S.buildings[key]}！`)}
function team(id){if(S.team.includes(id)){if(S.team.length===1){announce('至少需要一名守夜人。');return}S.team=S.team.filter(x=>x!==id);announce(`${byId[id].name} 已撤下。`)}else if(S.team.length>=3)announce('小隊已滿，請先撤下一人。');else{S.team.push(id);announce(`${byId[id].name} 已上陣。`)}save();render()}
function upgradeHero(id){const c=heroCost(id),o=S.owned[id];if(S.scrap<c)return;S.scrap-=c;o.lv++;save();render();announce(`${byId[id].name} 升至 Lv.${o.lv}！`)}function star(id){const c=starCost(id),o=S.owned[id];if(o.frag<c)return;o.frag-=c;o.star++;save();render();announce(`${byId[id].name} 升為 ★${o.star}！`)}
function pick(){const roll=Math.random()*100,pool=roll<3?heroes.filter(h=>h.rarity==='SSR'):roll<18?heroes.filter(h=>h.rarity==='SR'):roll<57?heroes.filter(h=>h.rarity==='R'):heroes.filter(h=>h.rarity==='C');return pool[Math.floor(Math.random()*pool.length)]}function draw(count){const costDraw=count===10?450:50;if(S.beacon<costDraw)return;S.beacon-=costDraw;const got=[];for(let i=0;i<count;i++){const h=i===9&&count===10?heroes.filter(x=>x.rarity!=='C')[Math.floor(Math.random()*10)]:pick(),old=S.owned[h.id],duplicate=!!old;if(old)old.frag+=h.rarity==='SSR'?60:h.rarity==='SR'?35:h.rarity==='R'?22:15;else S.owned[h.id]={lv:1,star:1,frag:0};got.push({...h,duplicate})}S.lastDraw=got;save();render();modal.innerHTML=`<section class="modal-box"><div class="label">SIGNAL RECEIVED</div><h2>${count===10?'十連廣播完成':'頻道接收完成'}</h2><div class="draws">${got.map(x=>`<div class="draw rarity-${x.rarity}"><div class="portrait">${x.icon}</div><b>${x.name}</b><br>${x.rarity}<br>${x.duplicate?'＋碎片':'加入小隊'}</div>`).join('')}</div><button class="button primary wide" data-act="close">確認結果</button></section>`;modal.hidden=false}
function battle(){if(S.battle)return;const s=stage(),chance=Math.max(.2,Math.min(.97,.28+power()/s.need*.62));S.battle={ends:Date.now()+2400,chance,chapter:S.chapter};render();setTimeout(resolveBattle,2450)}function resolveBattle(){if(!S.battle)return;const b=S.battle,s=stages[b.chapter-1],win=Math.random()<b.chance;S.battle=null;if(win){const m=1+(S.buildings.forge-1)*.07,a=Math.floor(s.scrap*m),c=Math.floor(s.cells*m),be=s.beacon;S.scrap+=a;S.cells+=c;S.beacon+=be;if(S.chapter<30)S.chapter++;save();render();loot(b.chapter===30?'黑塔已靜默':'關卡勝利！',[`▰ ${a}`,`▱ ${c}`,`◉ ${be}`],'WASTELAND CLEARED')}else{const a=Math.floor(s.scrap*.22);S.scrap+=a;save();render();loot('撤退，但仍有收穫',[`▰ ${a}`],'SIGNAL LOST')}}
function reset(){modal.innerHTML='<section class="modal-box"><div class="label">DANGER ZONE</div><h2>重置本機存檔？</h2><p class="sub">這會清除目前的角色、資源與關卡進度，無法復原。</p><button class="button rust" data-act="confirmReset">確定重置</button><button class="button" data-act="close">取消</button></section>';modal.hidden=false}
document.addEventListener('click',e=>{const b=e.target.closest('button');if(!b||b.disabled)return;if(b.dataset.tab){S.tab=b.dataset.tab;save();render();return}const a=b.dataset.act;if(a==='idle')claimIdle();else if(a==='chest')chest();else if(a==='building')upgradeBuilding(b.dataset.id);else if(a==='team')team(b.dataset.id);else if(a==='hero')upgradeHero(b.dataset.id);else if(a==='star')star(b.dataset.id);else if(a==='draw')draw(Number(b.dataset.count));else if(a==='battle')battle();else if(a==='reset')reset();else if(a==='confirmReset'){try{localStorage.removeItem(KEY)}catch{}S=fresh();save();modal.hidden=true;render();announce('新的頻率已建立。')}else if(a==='close')modal.hidden=true;});
window.__watchtower={reset:()=>{S=fresh();save();render()},state:()=>JSON.parse(JSON.stringify(S)),key:KEY};render();setInterval(()=>{if(S.battle&&Date.now()>=S.battle.ends)resolveBattle()},500);window.addEventListener('beforeunload',save);
})();
</script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>廢土守夜站</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10110d;
      --panel: #1b1b15;
      --panel-2: #252419;
      --line: #44402c;
      --text: #f3ead2;
      --muted: #b7ad90;
      --gold: #e0b451;
      --rust: #b85b35;
      --green: #8fb65c;
      --red: #d45743;
      --blue: #6ba6b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(224, 180, 81, .16), transparent 26rem),
        radial-gradient(circle at 80% 20%, rgba(184, 91, 53, .14), transparent 22rem),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
    }
    button {
      border: 1px solid #6d6240;
      border-radius: 6px;
      background: #2e2a1d;
      color: var(--text);
      padding: .65rem .75rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #3b3524; }
    button:disabled { color: #80765a; cursor: not-allowed; opacity: .65; }
    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 16px;
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 330px;
    }
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }
    h1 { margin: 0; font-size: clamp(1.55rem, 4vw, 2.4rem); letter-spacing: 0; }
    .tagline { color: var(--muted); margin-top: 4px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(84px, 1fr));
      gap: 8px;
    }
    .stat, .panel {
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent), var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .stat { padding: 9px 10px; }
    .label { color: var(--muted); font-size: .78rem; }
    .value { font-size: 1.05rem; font-weight: 800; margin-top: 2px; }
    .field {
      position: relative;
      min-height: 620px;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 620px;
      background: #15150f;
      border-radius: 8px;
      border: 1px solid var(--line);
      touch-action: manipulation;
    }
    .side { display: grid; gap: 12px; align-content: start; }
    .panel { padding: 12px; }
    .panel h2 { margin: 0 0 10px; font-size: 1rem; }
    .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .full { grid-column: 1 / -1; }
    .hint { color: var(--muted); line-height: 1.45; font-size: .9rem; }
    .cards { display: grid; gap: 8px; }
    .card {
      border: 1px solid #51492f;
      border-radius: 8px;
      padding: 10px;
      background: var(--panel-2);
    }
    .card strong { display: block; }
    .rare { color: var(--gold); }
    .log {
      min-height: 88px;
      max-height: 132px;
      overflow: auto;
      color: #d6c89d;
      font-size: .85rem;
      line-height: 1.45;
      border-top: 1px solid var(--line);
      padding-top: 8px;
      margin-top: 8px;
    }
    .bar { height: 8px; background: #342f22; border-radius: 99px; overflow: hidden; margin-top: 7px; }
    .bar span { display: block; height: 100%; background: linear-gradient(90deg, var(--red), var(--gold)); }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; padding: 10px; }
      header { align-items: start; flex-direction: column; }
      .stats { grid-template-columns: repeat(2, 1fr); width: 100%; }
      canvas { height: 540px; }
      .field { min-height: 540px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>廢土守夜站</h1>
        <div class="tagline">末日放置掛機 × 英雄上陣 × 手動塔防 × 倖存者抽卡</div>
      </div>
      <button id="resetBtn" type="button">重置存檔</button>
    </header>

    <section class="field" aria-label="戰場">
      <canvas id="game" width="760" height="620"></canvas>
    </section>

    <aside class="side">
      <section class="stats" aria-label="資源">
        <div class="stat"><div class="label">廢鐵</div><div class="value" id="scrap">0</div></div>
        <div class="stat"><div class="label">能量</div><div class="value" id="energy">0</div></div>
        <div class="stat"><div class="label">信標</div><div class="value" id="beacon">0</div></div>
        <div class="stat"><div class="label">關卡</div><div class="value" id="stage">1</div></div>
        <div class="stat"><div class="label">波次</div><div class="value" id="wave">1</div></div>
        <div class="stat"><div class="label">基地</div><div class="value" id="baseHp">100</div></div>
      </section>

      <section class="panel">
        <h2>建造</h2>
        <div class="grid">
          <button id="buildGun" type="button">機槍塔 35</button>
          <button id="buildSlow" type="button">冷凍塔 55</button>
          <button id="upgrade" class="full" type="button">升級火力 80</button>
          <button id="storm" class="full" type="button">手動技能：電磁風暴 30能量</button>
        </div>
        <p class="hint">抽到的英雄會自動上陣射擊。你負責補塔、升級火力、在 Boss 波用手動技能收尾。</p>
      </section>

      <section class="panel">
        <h2>倖存者抽卡</h2>
        <div class="grid">
          <button id="drawOne" type="button">抽 1 次 50信標</button>
          <button id="drawTen" type="button">抽 5 次 220信標</button>
        </div>
        <div class="cards" id="cards"></div>
      </section>

      <section class="panel">
        <h2>放置收益</h2>
        <div class="row"><span>隊伍戰力</span><strong id="power">0</strong></div>
        <button id="claimIdle" class="full" type="button">領取掛機補給</button>
        <p class="hint">離線最多累積 6 小時。這版先做本機存檔，朋友各玩各的。</p>
      </section>

      <section class="panel">
        <h2>狀態</h2>
        <div class="row"><span>下一波</span><strong id="nextWave">0s</strong></div>
        <div class="bar" aria-label="下一波進度"><span id="waveBar"></span></div>
        <div class="log" id="log" aria-live="polite"></div>
      </section>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const lanes = [170, 310, 450];
    const slots = [];
    for (let x = 160; x <= 560; x += 100) for (const y of lanes) slots.push({ x, y });

    const heroes = [
      { name: "修補師 阿岚", rare: "N", scrap: 1, dmg: 1, power: 18, text: "廢鐵產量 +1/s" },
      { name: "哨戒手 小柏", rare: "R", scrap: 0, dmg: 3, power: 34, text: "塔傷害 +3" },
      { name: "電工 米娜", rare: "R", energy: 1, dmg: 2, power: 31, text: "能量產量 +1/s" },
      { name: "末日隊長 玄武", rare: "SR", scrap: 2, dmg: 6, power: 72, text: "廢鐵 +2/s，塔傷害 +6" },
      { name: "灰燼女王", rare: "SSR", energy: 2, dmg: 11, power: 130, text: "能量 +2/s，塔傷害 +11" }
    ];
    const baseState = {
      scrap: 90, energy: 35, beacon: 80, stage: 1, wave: 1, baseHp: 100, fireLevel: 1,
      towers: [], enemies: [], cards: [], nextWave: 12, heroCool: 0, idleBank: 0,
      last: performance.now(), savedAt: Date.now(), log: []
    };
    let state = load();

    function load() {
      try {
        const loaded = { ...structuredClone(baseState), ...JSON.parse(localStorage.getItem("wasteland-watch") || "{}") };
        const away = Math.min(21600, Math.max(0, (Date.now() - (loaded.savedAt || Date.now())) / 1000));
        loaded.idleBank = (loaded.idleBank || 0) + away;
        loaded.last = performance.now();
        if (away > 30) loaded.log = [`離線補給累積 ${Math.floor(away / 60)} 分鐘。`, ...(loaded.log || [])].slice(0, 6);
        return loaded;
      } catch {
        return structuredClone(baseState);
      }
    }
    function save() {
      const keep = { ...state, enemies: [], last: performance.now(), savedAt: Date.now() };
      localStorage.setItem("wasteland-watch", JSON.stringify(keep));
    }
    function note(text) {
      state.log.unshift(text);
      state.log = state.log.slice(0, 6);
    }
    function heroBonus(key) {
      return state.cards.reduce((sum, card) => sum + (card[key] || 0), 0);
    }
    function squad() {
      const rank = { SSR: 5, SR: 4, R: 3, N: 1 };
      return [...state.cards].sort((a, b) => (rank[b.rare] - rank[a.rare]) || (b.power - a.power)).slice(0, 5);
    }
    function squadPower() {
      return squad().reduce((sum, card) => sum + card.power, 0) + state.fireLevel * 12 + state.stage * 8;
    }
    function canPay(kind, cost) {
      if (state[kind] < cost) return false;
      state[kind] -= cost;
      return true;
    }
    function nearestSlot(mx, my) {
      return slots.find(s => Math.hypot(s.x - mx, s.y - my) < 34 && !state.towers.some(t => t.x === s.x && t.y === s.y));
    }
    function spawnWave() {
      const boss = state.wave % 5 === 0;
      const count = boss ? 1 : 4 + Math.floor(state.wave * 1.45);
      for (let i = 0; i < count; i++) {
        const lane = lanes[i % lanes.length];
        state.enemies.push({
          x: canvas.width + i * 48,
          y: lane,
          hp: (24 + state.wave * 8) * (boss ? 8 : 1),
          max: (24 + state.wave * 8) * (boss ? 8 : 1),
          speed: (.34 + state.wave * .012) * (boss ? .65 : 1),
          slow: 0,
          boss
        });
      }
      note(boss ? `Boss 波：荒原巨獸出現。` : `第 ${state.wave} 波感染者靠近。`);
      state.wave++;
      state.nextWave = 18;
    }
    function addTower(type, slot) {
      const cost = type === "slow" ? 55 : 35;
      if (!canPay("scrap", cost)) return note("廢鐵不足。");
      state.towers.push({ type, x: slot.x, y: slot.y, cool: 0 });
      note(type === "slow" ? "冷凍塔已架設。" : "機槍塔已架設。");
    }
    function drawCards(times, cost) {
      if (!canPay("beacon", cost)) return note("信標不足。");
      for (let i = 0; i < times; i++) {
        const roll = Math.random();
        const pool = roll > .96 ? heroes[4] : roll > .82 ? heroes[3] : roll > .48 ? heroes[1 + Math.floor(Math.random() * 2)] : heroes[0];
        state.cards.push(pool);
        note(`招募：${pool.name}（${pool.rare}）`);
      }
    }
    function tick(dt) {
      state.scrap += (1.8 + heroBonus("scrap")) * dt;
      state.energy += (.75 + heroBonus("energy")) * dt;
      state.beacon += .18 * dt;
      if (state.idleBank > 0) state.idleBank += dt;
      state.nextWave -= dt;
      if (state.nextWave <= 0) spawnWave();

      for (const enemy of state.enemies) {
        enemy.slow = Math.max(0, enemy.slow - dt);
        enemy.x -= enemy.speed * (enemy.slow ? .42 : 1) * dt * 60;
        if (enemy.x < 72) {
          state.baseHp -= 8;
          enemy.hp = 0;
        }
      }
      const damage = 10 + state.fireLevel * 4 + heroBonus("dmg");
      for (const tower of state.towers) {
        tower.cool -= dt;
        if (tower.cool > 0) continue;
        const target = state.enemies.find(e => e.hp > 0 && Math.abs(e.y - tower.y) < 24 && Math.abs(e.x - tower.x) < 210);
        if (!target) continue;
        if (tower.type === "slow") target.slow = 2.2;
        target.hp -= tower.type === "slow" ? damage * .55 : damage;
        tower.cool = tower.type === "slow" ? .9 : .45;
      }
      state.heroCool -= dt;
      if (state.heroCool <= 0 && state.cards.length) {
        const active = squad();
        for (let i = 0; i < active.length; i++) {
          const lane = lanes[i % lanes.length];
          const target = state.enemies.find(e => e.hp > 0 && Math.abs(e.y - lane) < 24) || state.enemies.find(e => e.hp > 0);
          if (target) target.hp -= 4 + active[i].dmg + Math.floor(active[i].power / 14);
        }
        state.heroCool = .7;
      }
      const before = state.enemies.length;
      const killedBoss = state.enemies.some(e => e.boss && e.hp <= 0);
      state.enemies = state.enemies.filter(e => e.hp > 0);
      const killed = before - state.enemies.length;
      if (killed) {
        state.scrap += killed * (5 + state.wave * .4);
        state.beacon += killed * .9;
      }
      if (killedBoss) {
        state.stage++;
        state.beacon += 55;
        state.scrap += 120;
        note(`關卡 ${state.stage - 1} 已突破，補給 +120 廢鐵 / +55 信標。`);
      }
      if (state.baseHp <= 0) {
        note("基地失守，守夜站重建。保留倖存者卡片。");
        const cards = state.cards;
        state = { ...structuredClone(baseState), cards, stage: Math.max(1, state.stage - 1), last: performance.now(), log: state.log };
      }
    }
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#17170f";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#312d1d";
      ctx.fillRect(32, 104, 70, 420);
      ctx.fillStyle = "#e0b451";
      ctx.font = "700 18px Segoe UI";
      ctx.fillText("守夜站", 36, 95);
      for (const y of lanes) {
        ctx.strokeStyle = "#50472f";
        ctx.lineWidth = 22;
        ctx.beginPath();
        ctx.moveTo(80, y);
        ctx.lineTo(canvas.width - 20, y);
        ctx.stroke();
        ctx.strokeStyle = "#2b281b";
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 10]);
        ctx.beginPath();
        ctx.moveTo(80, y);
        ctx.lineTo(canvas.width - 20, y);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      for (const s of slots) {
        ctx.strokeStyle = state.towers.some(t => t.x === s.x && t.y === s.y) ? "#6d6240" : "#3a3524";
        ctx.strokeRect(s.x - 24, s.y - 24, 48, 48);
      }
      squad().forEach((hero, i) => {
        const y = lanes[i % lanes.length] - 36 + Math.floor(i / lanes.length) * 72;
        ctx.fillStyle = hero.rare === "SSR" ? "#e0b451" : hero.rare === "SR" ? "#b85b35" : "#6ba6b8";
        ctx.fillRect(48, y - 13, 26, 26);
        ctx.fillStyle = "#10110d";
        ctx.font = "700 11px Segoe UI";
        ctx.fillText(hero.rare, 51, y + 4);
      });
      for (const tower of state.towers) {
        ctx.fillStyle = tower.type === "slow" ? "#6ba6b8" : "#b85b35";
        ctx.beginPath();
        ctx.arc(tower.x, tower.y, 20, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#10110d";
        ctx.fillRect(tower.x - 6, tower.y - 26, 12, 22);
      }
      for (const e of state.enemies) {
        ctx.fillStyle = e.boss ? "#d45743" : e.slow ? "#8cc7d6" : "#8fb65c";
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.boss ? 28 : 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#3d1814";
        ctx.fillRect(e.x - 22, e.y - (e.boss ? 42 : 27), 44, 5);
        ctx.fillStyle = "#d45743";
        ctx.fillRect(e.x - 22, e.y - (e.boss ? 42 : 27), 44 * Math.max(0, e.hp / e.max), 5);
      }
    }
    function renderUi() {
      const set = (id, value) => document.getElementById(id).textContent = value;
      set("scrap", Math.floor(state.scrap));
      set("energy", Math.floor(state.energy));
      set("beacon", Math.floor(state.beacon));
      set("stage", state.stage);
      set("wave", state.wave);
      set("baseHp", Math.max(0, Math.floor(state.baseHp)));
      set("power", squadPower());
      set("nextWave", `${Math.max(0, Math.ceil(state.nextWave))}s`);
      document.getElementById("waveBar").style.width = `${Math.max(0, Math.min(100, (18 - state.nextWave) / 18 * 100))}%`;
      document.getElementById("buildGun").disabled = state.scrap < 35;
      document.getElementById("buildSlow").disabled = state.scrap < 55;
      document.getElementById("upgrade").disabled = state.scrap < 80;
      document.getElementById("storm").disabled = state.energy < 30;
      document.getElementById("drawOne").disabled = state.beacon < 50;
      document.getElementById("drawTen").disabled = state.beacon < 220;
      document.getElementById("log").innerHTML = state.log.map(x => `<div>${x}</div>`).join("");
      const counts = new Map();
      for (const card of state.cards) counts.set(card.name, { card, n: (counts.get(card.name)?.n || 0) + 1 });
      document.getElementById("cards").innerHTML = [...counts.values()].map(({ card, n }) =>
        `<div class="card"><strong class="${card.rare === "SSR" || card.rare === "SR" ? "rare" : ""}">${card.name} ×${n}</strong><span class="hint">${card.rare}｜${card.text}</span></div>`
      ).join("") || `<p class="hint">還沒有倖存者。先抽一張，讓基地更耐掛。</p>`;
    }
    let buildMode = "gun";
    canvas.addEventListener("click", (event) => {
      const rect = canvas.getBoundingClientRect();
      const x = (event.clientX - rect.left) / rect.width * canvas.width;
      const y = (event.clientY - rect.top) / rect.height * canvas.height;
      const slot = nearestSlot(x, y);
      if (slot) addTower(buildMode, slot);
    });
    document.getElementById("buildGun").onclick = () => { buildMode = "gun"; note("選擇機槍塔，點戰場格子放置。"); };
    document.getElementById("buildSlow").onclick = () => { buildMode = "slow"; note("選擇冷凍塔，點戰場格子放置。"); };
    document.getElementById("upgrade").onclick = () => {
      if (canPay("scrap", 80)) { state.fireLevel++; note(`火力升級到 Lv.${state.fireLevel}`); }
    };
    document.getElementById("storm").onclick = () => {
      if (!canPay("energy", 30)) return;
      for (const e of state.enemies) e.hp -= 42 + state.fireLevel * 6;
      note("電磁風暴掃過戰場。");
    };
    document.getElementById("drawOne").onclick = () => drawCards(1, 50);
    document.getElementById("drawTen").onclick = () => drawCards(5, 220);
    document.getElementById("claimIdle").onclick = () => {
      const seconds = Math.min(21600, state.idleBank || 0);
      if (seconds < 10) return note("補給還太少，等一下再領。");
      state.scrap += seconds * (1.6 + heroBonus("scrap"));
      state.energy += seconds * (.55 + heroBonus("energy"));
      state.beacon += seconds * .16;
      state.idleBank = 0;
      note(`已領取 ${Math.floor(seconds / 60)} 分鐘掛機補給。`);
    };
    document.getElementById("resetBtn").onclick = () => {
      localStorage.removeItem("wasteland-watch");
      state = structuredClone(baseState);
      note("存檔已重置。");
    };
    function loop(now) {
      const dt = Math.min(.08, (now - state.last) / 1000 || 0);
      state.last = now;
      tick(dt);
      draw();
      renderUi();
      requestAnimationFrame(loop);
    }
    function selfCheck() {
      console.assert(heroes.some(h => h.rare === "SSR"), "gacha has SSR");
      const old = structuredClone(state);
      state = { ...structuredClone(baseState), enemies: [{ x: 300, y: lanes[0], hp: 10, max: 10, speed: 0, slow: 0 }], towers: [{ type: "gun", x: 250, y: lanes[0], cool: 0 }], last: performance.now() };
      tick(.5);
      console.assert(state.enemies.length === 0, "tower kills weak enemy");
      state = old;
    }
    selfCheck();
    note("守夜站上線。先放機槍塔，撐過第 1 波。");
    requestAnimationFrame(loop);
    setInterval(save, 4000);
  </script>
</body>
</html>

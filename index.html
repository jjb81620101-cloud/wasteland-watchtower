<head>

<title>廢土守夜站｜前線指揮部</title>
<style>
:root{--night:#151914;--plate:#22281f;--panel:#2d3428;--edge:#626b52;--ink:#f1ead7;--muted:#afb19b;--amber:#e1b75b;--rust:#c66b43;--moss:#9eaf66;--cyan:#78b8b5;--danger:#d95e4f}*{box-sizing:border-box}body{margin:0;background:linear-gradient(155deg,#343b2d 0,#171b16 42%,#10130f);color:var(--ink);font:15px/1.35 "Microsoft JhengHei",system-ui,sans-serif;min-width:320px}.app{max-width:680px;margin:auto;min-height:100vh;padding:10px 10px 90px;background:linear-gradient(90deg,transparent 49%,#ffffff05 50%,transparent 51%);background-size:6px 6px}.top{border:1px solid var(--edge);background:#1c211a;box-shadow:0 4px 0 #090b08;padding:9px}.command{display:flex;justify-content:space-between;gap:8px;align-items:center;border-bottom:1px solid #505844;padding-bottom:8px}.brand{font-weight:900;letter-spacing:.1em;font-size:17px}.tag,.eyebrow{color:var(--amber);font-size:11px;font-weight:800;letter-spacing:.12em}.chapter{font-size:12px;color:var(--muted);text-align:right}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:8px}.stat{border-left:3px solid var(--edge);background:#161b14;padding:5px 7px;min-width:0}.stat small{display:block;color:var(--muted);font-size:10px}.stat b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff4d4}.shell{margin-top:10px}.view{display:none}.view.active{display:block}.hero-banner,.combat{border:1px solid var(--edge);background:linear-gradient(115deg,#343a2c,#252b21);padding:12px;position:relative;overflow:hidden}.hero-banner:after{content:"";position:absolute;right:-34px;bottom:-45px;width:150px;height:150px;border:14px solid #e1b75b22;transform:rotate(25deg)}h1,h2,h3,p{margin:0}h1{font-size:22px;max-width:360px;line-height:1.16}h2{font-size:16px;letter-spacing:.04em}h3{font-size:14px}.sub{color:var(--muted);font-size:12px;margin-top:5px;max-width:390px}.section{margin-top:10px;border:1px solid var(--edge);background:#252c22;padding:10px}.section-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.muted{color:var(--muted);font-size:12px}.grid{display:grid;gap:7px}.buildings{grid-template-columns:1fr 1fr}.building{border:1px solid #56604a;background:#1b2019;padding:9px;min-height:132px;display:flex;flex-direction:column;align-items:flex-start;gap:5px}.building .icon{font-size:26px;filter:saturate(.75)}.building b{font-size:14px}.building small{color:var(--muted);font-size:11px;min-height:30px}.building .effect{color:var(--amber);font-size:11px;margin-top:auto}.mission{border:1px solid #626b52;background:#191e17;padding:9px}.mission+.mission{margin-top:7px}.row{display:flex;align-items:center;justify-content:space-between;gap:8px}.meter{height:7px;background:#11150f;border:1px solid #535b45;margin:6px 0;overflow:hidden}.meter i{display:block;height:100%;background:var(--moss);transition:width .25s}.meter.amber i{background:var(--amber)}button{font:800 13px inherit;color:var(--ink);border:1px solid #757c62;background:#3a422f;padding:9px 10px;cursor:pointer;min-height:40px;touch-action:manipulation}button:hover,button:focus-visible{outline:none;border-color:var(--amber);background:#4b543a}button.primary{background:#775a2a;border-color:var(--amber)}button.rust{background:#623927;border-color:var(--rust)}button:disabled{opacity:.48;cursor:not-allowed}.wide{width:100%}.two{display:grid;grid-template-columns:1fr 1fr;gap:7px}.notice{min-height:35px;margin-top:10px;padding:8px 10px;border-left:3px solid var(--amber);background:#191d16;color:#f7df9e;font-size:12px}.combat{min-height:238px}.versus{display:grid;grid-template-columns:1fr 32px 1fr;gap:5px;align-items:center;margin-top:13px}.vs{text-align:center;color:var(--rust);font-weight:900}.fighter{border:1px solid #59634a;background:#171c15;padding:7px;min-height:105px}.fighter.enemy{border-color:#8e4c38}.fighter .portrait{font-size:28px}.fighter .name{font-size:12px;font-weight:800}.fighter .role{font-size:10px;color:var(--muted)}.battle-log{margin-top:9px;color:var(--muted);font-size:12px}.list{display:grid;gap:7px}.hero{display:grid;grid-template-columns:43px 1fr auto;gap:8px;align-items:center;border:1px solid #59624d;background:#1b2119;padding:8px}.avatar{width:43px;height:43px;display:grid;place-items:center;background:#30392b;border:1px solid currentColor;font-size:20px}.hero .meta{font-size:11px;color:var(--muted)}.hero .name{font-weight:900}.hero .actions{display:grid;gap:4px}.hero button{font-size:11px;min-height:28px;padding:4px 6px}.rarity-C{color:#bfc4af}.rarity-R{color:var(--cyan)}.rarity-SR{color:var(--amber)}.rarity-SSR{color:#f08c62}.summon{background:linear-gradient(135deg,#20261e,#3b3023);border:1px solid #806a40;padding:11px}.draw-results{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:9px}.draw-card{border:1px solid #647052;background:#171c15;padding:7px;text-align:center;font-size:10px}.draw-card .avatar{margin:auto auto 4px;width:34px;height:34px;font-size:17px}.bottom{position:fixed;bottom:0;left:0;right:0;background:#151914eF;border-top:1px solid #727b60;display:grid;grid-template-columns:repeat(4,1fr);padding:5px calc(max(8px,env(safe-area-inset-left))) calc(5px + env(safe-area-inset-bottom));z-index:5}.bottom button{border:0;background:transparent;color:var(--muted);min-height:52px;font-size:12px;padding:4px}.bottom button.active{color:var(--amber);box-shadow:inset 0 2px 0 var(--amber)}.reward{border:1px dashed #8c7b4c;background:#2b2a1c;padding:8px;font-size:12px}.tiny{font-size:10px;color:var(--muted)}@media(min-width:700px){.app{margin-top:16px;margin-bottom:16px;border:1px solid #48503d}.bottom{left:50%;right:auto;transform:translateX(-50%);width:680px;border:1px solid #727b60;border-bottom:0}}@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style></head><body><main class="app" id="app" aria-live="polite"></main>
<nav class="bottom" aria-label="主選單"><button data-tab="base" class="active">▦<br>主城</button><button data-tab="campaign">⚔<br>戰役</button><button data-tab="heroes">◈<br>英雄</button><button data-tab="summon">✦<br>召喚</button></nav>
<script>
(()=>{"use strict";const KEY="wasteland-watchtower-v2",$=s=>document.querySelector(s),app=$("#app");
const H=[
 ["kade","鎖鏈 凱德","C","突擊","⛓",18],["lira","聽風 莉拉","C","支援","◌",16],["ivo","路障 伊沃","R","守衛","▣",23],["mira","砂鴞 米拉","R","斥候","◉",26],["tess","燃料 泰絲","R","爆破","✹",29],["oren","修補 奧倫","R","工兵","⚒",21],["sena","巡弋 瑟娜","SR","游擊","⌁",35],["voss","零點 沃斯","SR","醫護","✚",31],["yara","裂谷 雅菈","SR","狙擊","⌖",41],["bram","鐵幕 布拉姆","SR","先鋒","⬡",38],["nemi","霧燈 奈米","SSR","指揮","✦",54],["sol","餘暉 索爾","SSR","訊號師","☼",49]
].map(([id,n,r,role,icon,atk])=>({id,n,r,role,icon,atk}));const byId=Object.fromEntries(H.map(x=>[x.id,x]));
const B={command:{n:"指揮所",icon:"▦",d:"整合前線指令，提升全隊戰力。",base:110,e:l=>`全隊戰力 +${l*7}%`},collector:{n:"採集站",icon:"⚙",d:"把廢墟轉成可用的廢鋼。",base:95,e:l=>`廢鋼掛機 +${l*12}%`},beacon:{n:"信標塔",icon:"⌁",d:"長波招募頻道，累積信標。",base:105,e:l=>`信標掛機 +${l*10}%`},forge:{n:"兵工廠",icon:"⚒",d:"改裝裝備，戰役獎勵更豐厚。",base:120,e:l=>`戰役獎勵 +${l*9}%`}};
const stages=Array.from({length:30},(_,i)=>{let no=i+1,boss=no%5===0;return{no,boss,n:boss?`第 ${no} 節・${["鐵鏽巨獸","斷訊獵手","鹽沼執刑者","焦土巡弋者","灰原收割機","零號守門人"][Math.floor(i/5)]}`:`第 ${no} 節・${["碎石哨線","無人月台","乾涸水塔","風蝕隧道","舊城邊界"][i%5]}`,need:70+no*48+(boss?80:0),scrap:70+no*22,cell:18+no*6,beacon:3+Math.floor(no/3)}});
function fresh(){return{v:2,tab:"base",scrap:720,cells:140,beacon:180,chapter:1,buildings:{command:1,collector:1,beacon:1,forge:1},owned:{kade:{lv:5,star:1,frag:0},lira:{lv:5,star:1,frag:0},ivo:{lv:4,star:1,frag:0}},team:["kade","lira","ivo"],idleAt:Date.now()-75000,chestAt:Date.now()-190000,battle:null,lastDraw:[],note:"補給已堆在入口：先領取、升級、再推進前線。"}}
function sane(raw){let s=fresh();if(!raw||raw.v!==2)return s;Object.assign(s,raw);for(const k of Object.keys(B))s.buildings[k]=Math.max(1,Number(s.buildings?.[k])||1);s.owned=typeof s.owned==="object"&&s.owned?s.owned:{};s.team=Array.isArray(s.team)?s.team.filter(id=>s.owned[id]&&byId[id]).slice(0,3):[];if(!s.team.length)s.team=["kade","lira","ivo"].filter(id=>s.owned[id]);s.chapter=Math.min(30,Math.max(1,Number(s.chapter)||1));s.battle=null;s.lastDraw=Array.isArray(s.lastDraw)?s.lastDraw.slice(0,10):[];return s}
let S;try{S=sane(JSON.parse(localStorage.getItem(KEY)))}catch{S=fresh()}function save(){try{localStorage.setItem(KEY,JSON.stringify({...S,battle:null}))}catch{S.note="無法寫入本機存檔；本次進度仍可繼續。"}}
const fmt=n=>Math.floor(n).toLocaleString("zh-Hant"),lv=id=>S.owned[id]?.lv||0,star=id=>S.owned[id]?.star||0;
function power(){let unit=S.team.reduce((a,id)=>a+(byId[id].atk*(1+(lv(id)-1)*.16)*(1+(star(id)-1)*.2)),0);return Math.floor(unit*(1+S.buildings.command*.07))}
function rates(){return{scrap:.45*(1+(S.buildings.collector-1)*.12),cells:.12*(1+(S.buildings.command-1)*.04),beacon:.028*(1+(S.buildings.beacon-1)*.1)}}
function idleSecs(){return Math.min(28800,Math.max(0,(Date.now()-S.idleAt)/1000))}function idleReward(){let t=idleSecs(),r=rates();return{t,scrap:Math.floor(t*r.scrap),cells:Math.floor(t*r.cells),beacon:Math.floor(t*r.beacon)}}
function note(t){S.note=t;save();render()}function cost(k){let l=S.buildings[k];return Math.floor(B[k].base*Math.pow(1.5,l-1))}function stage(){return stages[S.chapter-1]}
function header(){return `<header class="top"><div class="command"><div><div class="tag">WASTELAND WATCH · LOCAL COMMAND</div><div class="brand">廢土守夜站 <span class="tiny">v2</span></div></div><div class="chapter">隊伍戰力<br><b>${fmt(power())}</b>　章節 ${S.chapter}/30</div></div><div class="stats"><div class="stat"><small>廢鋼</small><b>⛓ ${fmt(S.scrap)}</b></div><div class="stat"><small>電池</small><b>▣ ${fmt(S.cells)}</b></div><div class="stat"><small>信標</small><b>⌁ ${fmt(S.beacon)}</b></div></div></header>`}
function baseView(){let r=idleReward(),chest=Math.max(0,180-(Date.now()-S.chestAt)/1000),ready=chest===0;return `<section class="view ${S.tab==="base"?"active":""}" id="base"><div class="hero-banner"><div class="eyebrow">前線指揮部</div><h1>讓每一盞燈，都成為下一次遠征的理由。</h1><p class="sub">主城會持續產出補給；每次強化都讓你的三人小隊走得更遠。</p></div><section class="section"><div class="section-head"><h2>待領補給</h2><span class="muted">離線上限 8 小時</span></div><div class="reward"><b>掛機收穫</b><br>⛓ ${fmt(r.scrap)}　▣ ${fmt(r.cells)}　⌁ ${fmt(r.beacon)}<br><span class="tiny">累積 ${Math.floor(r.t/60)} 分鐘；採集站與信標塔會提高效率。</span></div><button class="primary wide" data-act="claimIdle">一鍵領取補給</button><div class="reward" style="margin-top:7px"><b>戰役補給箱</b><br>${ready?"已備妥：廢鋼、電池與信標。":`下一箱約 ${Math.ceil(chest/60)} 分鐘`}</div><button class="wide" data-act="claimChest" ${ready?"":"disabled"}>${ready?"開啟戰役補給箱":"補給運輸中"}</button></section><section class="section"><div class="section-head"><h2>基地模組</h2><span class="muted">升級立即生效</span></div><div class="grid buildings">${Object.entries(B).map(([k,b])=>`<article class="building"><span class="icon">${b.icon}</span><b>${b.n}　Lv.${S.buildings[k]}</b><small>${b.d}</small><span class="effect">${b.e(S.buildings[k])}</span><button data-act="upBuild" data-k="${k}" ${S.scrap<cost(k)?"disabled":""}>升級　⛓ ${fmt(cost(k))}</button></article>`).join("")}</div></section></section>`}
function campView(){let st=stage(),p=power(),battle=S.battle,ratio=Math.min(100,Math.floor(p/st.need*100));return `<section class="view ${S.tab==="campaign"?"active":""}" id="campaign"><section class="combat"><div class="eyebrow">荒原戰役</div><div class="row"><h1>${st.n}</h1><span class="tag">推薦 ${fmt(st.need)}</span></div><p class="sub">敵方正在封鎖信標線。點擊挑戰後，小隊會自動交戰約 9 秒。</p><div class="versus"><div class="fighter"><div class="tiny">我方小隊・${fmt(p)}</div>${S.team.map(id=>`<span title="${byId[id].n}">${byId[id].icon}</span>`).join(" ")}<div class="meter amber"><i style="width:${Math.min(100,ratio)}%"></i></div><div class="tiny">${S.team.map(id=>byId[id].n).join("、")}</div></div><div class="vs">VS</div><div class="fighter enemy"><div class="tiny">${st.boss?"關卡首領":"荒原敵群"}・${fmt(st.need)}</div><div class="portrait">${st.boss?"☠":"♜ ♜ ♜"}</div><div class="name">${st.boss?"重裝掠奪者":"塵暴巡邏隊"}</div><div class="meter"><i style="width:100%"></i></div></div></div><div class="battle-log">${battle?`自動交戰中，剩餘 ${Math.max(0,Math.ceil((battle.ends-Date.now())/1000))} 秒。`:p>=st.need?"戰力優勢：可穩定推進。":"可越級挑戰，但勝率會下降；升級英雄或主城可提高把握。"}</div><button class="primary wide" data-act="battle" ${battle?"disabled":""}>${battle?"前線交火中…":"挑戰關卡・自動戰鬥"}</button></section><section class="section"><div class="section-head"><h2>章節地圖</h2><span class="muted">已抵達 ${S.chapter}/30</span></div><div class="list">${stages.slice(Math.max(0,S.chapter-3),Math.min(30,S.chapter+2)).map(x=>`<div class="mission"><div class="row"><b>${x.no===S.chapter?"▶ ":x.no<S.chapter?"✓ ":"○ "}${x.n}</b><span class="tag">${fmt(x.need)}</span></div><div class="tiny">勝利：⛓ ${x.scrap}　▣ ${x.cell}　⌁ ${x.beacon}${x.boss?"　首領獎勵加成":""}</div></div>`).join("")}</div></section></section>`}
function heroRow(id){let h=byId[id],o=S.owned[id],inTeam=S.team.includes(id),uc=Math.floor(45*Math.pow(1.35,o.lv-1)),sc=25+o.star*20;return `<article class="hero rarity-${h.r}"><div class="avatar">${h.icon}</div><div><div class="name">${h.n} <span class="tiny">${h.r}・${h.role}</span></div><div class="meta">Lv.${o.lv}　★${o.star}　戰力 ${fmt(h.atk*(1+(o.lv-1)*.16)*(1+(o.star-1)*.2))}</div><div class="meta">碎片 ${o.frag}/${sc}</div></div><div class="actions"><button data-act="team" data-id="${id}">${inTeam?"撤下":"上陣"}</button><button data-act="upHero" data-id="${id}" ${S.scrap<uc?"disabled":""}>升級 ⛓${uc}</button><button data-act="star" data-id="${id}" ${o.frag<sc?"disabled":""}>升星 ★${sc}</button></div></article>`}
function heroesView(){let owned=Object.keys(S.owned);return `<section class="view ${S.tab==="heroes"?"active":""}" id="heroes"><section class="hero-banner"><div class="eyebrow">夜巡編制</div><h1>上陣 3 人，讓專長與等級一起變成戰力。</h1><p class="sub">英雄升級消耗廢鋼；重複招募會轉為專屬碎片，可用於升星。</p></section><section class="section"><div class="section-head"><h2>目前小隊</h2><span class="tag">${S.team.length}/3 上陣</span></div><div class="tiny">${S.team.map(id=>`${byId[id].icon} ${byId[id].n} Lv.${lv(id)}`).join("　")||"尚未編制"}</div></section><section class="section"><div class="section-head"><h2>已招募英雄</h2><span class="muted">${owned.length}/12</span></div><div class="list">${owned.sort((a,b)=>H.indexOf(byId[b])-H.indexOf(byId[a])).map(heroRow).join("")}</div></section></section>`}
function summonView(){return `<section class="view ${S.tab==="summon"?"active":""}" id="summon"><section class="summon"><div class="eyebrow">長波招募頻道</div><h1>霧中仍有人回應。</h1><p class="sub">只消耗遊戲內信標，不含金流。每 10 次招募至少出現一名稀有或更高的守夜者。</p><div class="two" style="margin-top:10px"><button data-act="draw" data-n="1" ${S.beacon<50?"disabled":""}>招募 1 次<br><small>⌁ 50</small></button><button class="primary" data-act="draw" data-n="10" ${S.beacon<450?"disabled":""}>連線 10 次<br><small>⌁ 450</small></button></div></section><section class="section"><div class="section-head"><h2>最近訊號</h2><span class="muted">招募結果</span></div>${S.lastDraw.length?`<div class="draw-results">${S.lastDraw.map(x=>`<div class="draw-card rarity-${x.r}"><div class="avatar">${x.icon}</div><b>${x.n}</b><br>${x.dup?"＋碎片":"新加入"}</div>`).join("")}</div>`:"<p class=\"muted\">信標塔正在掃描倖存者頻道。</p>"}</section></section>`}
function render(){app.innerHTML=header()+`<div class="shell">${baseView()}${campView()}${heroesView()}${summonView()}</div><div class="notice" role="status">${S.note}</div>`}
function upgradeBuild(k){let c=cost(k);if(S.scrap<c)return note("廢鋼不足，先領取補給或完成戰役。");S.scrap-=c;S.buildings[k]++;note(`${B[k].n} 升至 Lv.${S.buildings[k]}，${B[k].e(S.buildings[k])}。`)}
function claimIdle(){let r=idleReward();if(r.t<2)return note("補給剛開始累積，再等幾秒。 ");S.scrap+=r.scrap;S.cells+=r.cells;S.beacon+=r.beacon;S.idleAt=Date.now();note(`已領取：⛓ ${fmt(r.scrap)}、▣ ${fmt(r.cells)}、⌁ ${fmt(r.beacon)}。`)}
function chest(){if(Date.now()-S.chestAt<180000)return;let m=1+(S.buildings.forge-1)*.09;let a=Math.floor(110*m),c=Math.floor(28*m),b=12+S.buildings.beacon*2;S.scrap+=a;S.cells+=c;S.beacon+=b;S.chestAt=Date.now();note(`戰役補給箱開啟：⛓ ${a}、▣ ${c}、⌁ ${b}。`)}
function team(id){if(S.team.includes(id)){if(S.team.length===1)return note("至少保留一名守夜者上陣。");S.team=S.team.filter(x=>x!==id);return note(`${byId[id].n} 已撤下。`)}if(S.team.length>=3)return note("小隊已滿 3 人，先撤下一名英雄。");S.team.push(id);note(`${byId[id].n} 已加入小隊。`)}
function upHero(id){let o=S.owned[id],c=Math.floor(45*Math.pow(1.35,o.lv-1));if(S.scrap<c)return note("廢鋼不足，先去主城領取補給。");S.scrap-=c;o.lv++;note(`${byId[id].n} 升至 Lv.${o.lv}，小隊戰力提升。`)}function upStar(id){let o=S.owned[id],c=25+o.star*20;if(o.frag<c)return note("專屬碎片不足；重複招募可取得碎片。");o.frag-=c;o.star++;note(`${byId[id].n} 升至 ★${o.star}，基礎能力強化。`)}
function pick(){let r=Math.random()*100;let pool=r<3?H.filter(x=>x.r==="SSR"):r<18?H.filter(x=>x.r==="SR"):r<57?H.filter(x=>x.r==="R"):H.filter(x=>x.r==="C");return pool[Math.floor(Math.random()*pool.length)]}function draw(n){let c=n===10?450:50;if(S.beacon<c)return note("信標不足，升級信標塔或開啟補給箱可取得更多。");S.beacon-=c;let out=[];for(let i=0;i<n;i++){let h=i===9&&n===10?H.filter(x=>x.r!=="C")[Math.floor(Math.random()*8)]:pick(),o=S.owned[h.id],dup=!!o;if(o)o.frag+=(h.r==="SSR"?60:h.r==="SR"?35:h.r==="R"?22:15);else S.owned[h.id]={lv:1,star:1,frag:0};out.push({...h,dup})}S.lastDraw=out;S.tab="summon";note(n===10?"十道訊號已解析，重複英雄已轉成碎片。":"招募完成：新的守夜者已回報。")}
function battle(){if(S.battle)return;let st=stage(),p=power(),chance=Math.max(.2,Math.min(.97,.27+p/st.need*.63));S.battle={ends:Date.now()+9000,chance,stage:S.chapter};S.note="小隊正在自動交戰；請守住信號。";save();render();setTimeout(resolveBattle,9100)}function resolveBattle(){if(!S.battle)return;let b=S.battle,st=stages[b.stage-1];S.battle=null;let win=Math.random()<b.chance,m=1+(S.buildings.forge-1)*.09;if(win){let a=Math.floor(st.scrap*m),c=Math.floor(st.cell*m),be=st.beacon;S.scrap+=a;S.cells+=c;S.beacon+=be;if(S.chapter<30)S.chapter++;S.note=`戰役勝利！獲得 ⛓ ${a}、▣ ${c}、⌁ ${be}${S.chapter===30&&b.stage===30?"；荒原主線已打通。":"，下一關已解鎖。"}`}else{let a=Math.floor(st.scrap*.22);S.scrap+=a;S.note=`撤退成功，回收 ⛓ ${a}。這關仍可挑戰；先強化小隊會更穩。`}save();render()}
document.addEventListener("click",e=>{let b=e.target.closest("button");if(!b||b.disabled)return;if(b.dataset.tab){S.tab=b.dataset.tab;save();render();document.querySelectorAll(".bottom button").forEach(x=>x.classList.toggle("active",x===b));return}let a=b.dataset.act;if(a==="claimIdle")claimIdle();if(a==="claimChest")chest();if(a==="upBuild")upgradeBuild(b.dataset.k);if(a==="battle")battle();if(a==="team")team(b.dataset.id);if(a==="upHero")upHero(b.dataset.id);if(a==="star")upStar(b.dataset.id);if(a==="draw")draw(+b.dataset.n)});
window.__watchtower={power,stages,save:()=>save(),reset:()=>{S=fresh();save();render()}};render();setInterval(()=>{if(S.battle){if(Date.now()>=S.battle.ends)resolveBattle();else render()}},1000);window.addEventListener("beforeunload",save);
})();
</script></body></html>

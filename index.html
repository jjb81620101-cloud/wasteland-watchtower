function unitPower(id){const h=byId[id];return Math.floor(h.attack*(1+(level(id)-1)*.16)*(1+(stars(id)-1)*.18))}function power(){return Math.floor(S.team.reduce((sum,id)=>sum+unitPower(id),0)*(1+(S.buildings.bunker-1)*.04))}function rates(){return{scrap:.42*(1+(S.buildings.yard-1)*.12),cells:.11*(1+(S.buildings.bunker-1)*.04),beacon:.027*(1+(S.buildings.tower-1)*.1)}}function idle(){const sec=Math.min(8*3600,Math.max(0,(Date.now()-S.idleAt)/1000)),r=rates();return{sec,scrap:Math.floor(sec*r.scrap),cells:Math.floor(sec*r.cells),beacon:Math.floor(sec*r.beacon)}}function cost(k){return Math.floor(buildings[k].base*Math.pow(1.48,S.buildings[k]-1))}function heroCost(id){return Math.floor(48*Math.pow(1.32,level(id)-1))}function starCost(id){return 22+stars(id)*22}function announce(text){toast.textContent=text;toast.classList.add('show');clearTimeout(announce.timer);announce.timer=setTimeout(()=>toast.classList.remove('show'),2600)}
const disciplineNames={assault:'火力',control:'控場',support:'後勤'},dutyDefs=[{name:'近線哨',desc:'自動火力 +16%',auto:1.16,radius:1,cool:1,repair:1},{name:'測距席',desc:'技能半徑 +14%',auto:1,radius:1.14,cool:1,repair:1},{name:'中繼席',desc:'冷卻 -12%，修復 +18%',auto:1,radius:1,cool:.88,repair:1.18}];

function campaignView(){const t=S.tactical,s=stage();prepareFormation(t);const phaseText={briefing:'整備',live:'交戰中',intermission:'下一波接近',upgrade:'選擇強化',breach:'核心遭突破',clear:'區域淨空'}[t.phase]||'待命',aim=t.aim?`--aim-x:${t.reticle.x*100}%;--aim-y:${t.reticle.y*100}%`:'';const fieldButton=t.phase==='briefing'?`<button class="button rust" data-act="battle">接通誘餌，開始 10 波守夜<b>之後敵潮自動推進</b></button>`:`<button class="button green" data-act="repair" ${t.phase==='breach'||S.cells<14||t.core>=100?'disabled':''}>補修塔芯　▱ 14<b>立即回復 18%</b></button>`;return `<section class="view ${S.tab==='campaign'?'active':''}"><section class="battle-console"><header class="battle-header"><div class="label">MANUAL SWARM DEFENSE // v5</div><h1 class="stage-title">${s.name}</h1><p class="sub">防線自動射擊；你要在壓力抵達前召集人手、校準火力，並手動決定技能落點。</p><div class="combat-status"><span>波次 ${t.wave}/${t.waves}・${phaseText}</span><span>零件 ${Math.floor(t.coins)}</span><span class="${t.core>35?'core-readout':'danger-readout'}">塔芯 ${Math.max(0,Math.round(t.core))}%</span></div><div class="wave-track">${Array.from({length:10},(_,i)=>`<i class="${i<t.wave?'done':''} ${i===t.wave-1&&t.phase==='live'?'now':''}"></i>`).join('')}</div></header><div class="battlefield ${t.aim?'aiming':''}" style="${aim}" aria-label="單一縱深手動塔防戰場">${t.enemies.map(enemyMarkup).join('')}<button class="field-input enemy-field" data-act="battlefield" aria-label="${t.aim?'選擇技能落點':'敵潮推進區'}"></button>${t.aim?`<span class="target-reticle" style="left:${t.reticle.x*100}%;top:${t.reticle.y*100}%"></span>`:''}${t.flash&&Date.now()<t.flash.until?`<span class="impact" style="left:${t.flash.x*100}%;top:${t.flash.y*100}%"></span>`:''}${t.phase==='intermission'?'<span class="intermission">下一波正在逼近…</span>':''}${upgradePrompt(t)}<div class="tower-core">廣播塔芯 <span class="core-bar"><i style="width:${Math.max(0,t.core)}%"></i></span> ${Math.max(0,Math.round(t.core))}%</div><div class="formation" aria-label="守夜人火線">${formationMarkup(t)}</div></div><section class="field-economy"> function renderBattleFrame(){const t=S.tactical,root=document.querySelector('.view.active .battle-console');if(!root||S.tab!=='campaign'){render();return}const status=root.querySelectorAll('.combat-status span');if(status.length===3){status[0].textContent=`波次 ${t.wave}/${t.waves}・交戰中`;status[1].textContent=`零件 ${Math.floor(t.coins)}`;status[2].textContent=`塔芯 ${Math.max(0,Math.round(t.core))}%`;status[2].className=t.core>35?'core-readout':'danger-readout'}const field=root.querySelector('.battlefield'),input=field?.querySelector('.field-input');if(field&&input){field.querySelectorAll(':scope > .enemy').forEach(e=>e.remove());input.insertAdjacentHTML('beforebegin',t.enemies.map(enemyMarkup).join(''))}const core=root.querySelector('.tower-core'),bar=core?.querySelector('.core-bar i');if(core&&bar){bar.style.width=`${Math.max(0,t.core)}%`;core.lastChild.textContent=` ${Math.max(0,Math.round(t.core))}%`}const economy=root.querySelectorAll('.economy-readout span');if(economy.length===3){economy[0].textContent=`戰地零件 ${Math.floor(t.coins)}`;economy[1].textContent=`指令 ${t.command.toFixed(1)}/${t.maxCommand}`;economy[2].textContent=`火力校準 +${t.calibration*12}%`}root.querySelectorAll('.unit-card').forEach(b=>{const slot=Number(b.dataset.slot),u=t.formation[slot];if(!u)return;const p=skillProfile(u.id),left=Math.max(0,u.readyAt-Date.now()),ready=left<=0&&t.command>=p.cost;b.disabled=!ready;b.classList.toggle('ready',ready);b.classList.toggle('aimed',t.aim?.slot===slot);b.querySelector('small').textContent=left>0?Math.ceil(left/1000):p.name;b.setAttribute('aria-label',`${byId[u.id].name}，${p.name}${left>0?`，冷卻 ${Math.ceil(left/1000)} 秒`:'，可施放'}`);b.classList.toggle('firing',Date.now()-(u._fireAt||0)<130)});if(field)drainFx(field);const log=root.closest('.view').querySelector('.wave-log');if(log){log.innerHTML=t.log.slice(-3).map(x=>`<li>${x}</li>`).join('');const kills=log.closest('.panel').querySelector('.panel-head>.utility');if(kills)kills.textContent=`擊殺 ${t.kills||0}`}}

function claimIdle(){const r=idle();if(r.sec<2)return;S.scrap+=r.scrap;S.cells+=r.cells;S.beacon+=r.beacon;S.idleAt=Date.now();save();render();loot('補給已入庫',[`▰ ${fmt(r.scrap)}`,`▱ ${fmt(r.cells)}`,`◉ ${fmt(r.beacon)}`],'OFFLINE SUPPLY')}function chest(){if(Date.now()-S.chestAt<180000)return;const m=1+(S.buildings.forge-1)*.07,a=Math.floor(110*m),c=Math.floor(26*m),b=12+S.buildings.tower*2;S.scrap+=a;S.cells+=c;S.beacon+=b;S.chestAt=Date.now();save();render();loot('例行投遞',[`▰ ${a}`,`▱ ${c}`,`◉ ${b}`],'SUPPLY DROP')}function upgradeBuilding(key){const c=cost(key);if(S.scrap<c)return;S.scrap-=c;S.buildings[key]++;save();render();announce(`${buildings[key].name} 升至 Lv.${S.buildings[key]}！`)}
function team(id){if(S.team.includes(id)){if(S.team.length===1){announce('至少需要一名守夜人。');return}S.team=S.team.filter(x=>x!==id);S.tactical=blankTactical();announce(`${byId[id].name} 已撤下。`)}else if(S.team.length>=3)announce('小隊已滿，請先撤下一人。');else{S.team.push(id);S.tactical=blankTactical();announce(`${byId[id].name} 已上陣。`)}save();render()}function upgradeHero(id){const c=heroCost(id),o=S.owned[id];if(S.scrap<c)return;S.scrap-=c;o.lv++;save();render();announce(`${byId[id].name} 升至 Lv.${o.lv}！`)}function star(id){const c=starCost(id),o=S.owned[id];if(o.frag<c)return;o.frag-=c;o.star++;save();render();announce(`${byId[id].name} 升為 ★${o.star}！`)}
function pick(){const roll=Math.random()*100,pool=roll<3?heroes.filter(h=>h.rarity==='SSR'):roll<18?heroes.filter(h=>h.rarity==='SR'):roll<57?heroes.filter(h=>h.rarity==='R'):heroes.filter(h=>h.rarity==='C');return pool[Math.floor(Math.random()*pool.length)]}function draw(count){const costDraw=count===10?450:50;if(S.beacon<costDraw)return;S.beacon-=costDraw;const got=[];for(let i=0;i<count;i++){const h=i===9&&count===10?heroes.filter(x=>x.rarity!=='C')[Math.floor(Math.random()*10)]:pick(),old=S.owned[h.id],duplicate=!!old;if(old)old.frag+=h.rarity==='SSR'?60:h.rarity==='SR'?35:h.rarity==='R'?22:15;else S.owned[h.id]={lv:1,star:1,frag:0};got.push({...h,duplicate})}S.lastDraw=got;save();render();modal.innerHTML=`<section class="modal-box"><div class="label">SIGNAL RECEIVED</div><h2>${count===10?'十連廣播完成':'頻道接收完成'}</h2><div class="draws">${got.map(x=>`<div class="draw rarity-${x.rarity}"><div class="portrait">${portraitFor(x.id)?`<img src="${portraitFor(x.id)}" alt="" loading="lazy">`:x.icon}</div><b>${x.name}</b><br>${x.rarity}<br>${x.duplicate?'＋碎片':'加入小隊'}</div>`).join('')}</div><button class="button primary wide" data-act="close">確認結果</button></section>`;modal.hidden=false}
function tacticalLog(text){S.tactical.log.push(text);S.tactical.log=S.tactical.log.slice(-7)}
function beginBattle(){const t=S.tactical;if(t.phase!=='briefing')return;prepareFormation(t);t.wave=0;t.core=Math.min(100,100+(S.buildings.bunker-1)*6);t.lastTick=Date.now();tacticalLog('誘餌頻率已接通；敵潮會連續推進。');launchWave()}
function launchWave(){const t=S.tactical;if(t.wave>=t.waves)return;t.phase='live';t.wave++;t.spawned=0;t.total=4+Math.ceil(t.wave*.7)+(t.wave%5===0?1:0);t.spawnAt=Date.now()+280;t.lastTick=Date.now();t.aim=null;tacticalLog(`第 ${t.wave} 波：偵測到 ${t.total} 個移動熱源。`);render()}
function spawnEnemy(){const t=S.tactical,s=stage(),n=t.spawned++,boss=t.wave%5===0&&n===t.total-1,roll=Math.random(),kind=boss||roll<.2?'brute':roll<.5?'runner':'drifter',mult=kind==='brute'?2.15:kind==='runner'?.72:1,max=Math.round((s.need*.46+t.wave*11)*mult),speed=(kind==='brute'?.026:kind==='runner'?.055:.038)+t.wave*.0012;t.enemies.push({id:++t.enemySeq,x:.08+Math.random()*.84,pos:0,hp:max,max,kind,damage:kind==='brute'?18:kind==='runner'?7:10,speed,bounty:kind==='brute'?20:kind==='runner'?9:12,slowUntil:0})}
function collectDefeated(){const t=S.tactical,dead=t.enemies.filter(e=>e.hp<=0);if(!dead.length)return;dead.forEach(e=>{t.coins+=Math.round(e.bounty*t.perks.coin);t.command=Math.min(t.maxCommand,t.command+(e.kind==='brute'?.75:.24));t.kills=(t.kills||0)+1});t.enemies=t.enemies.filter(e=>e.hp>0)}
function resolveTactical(){const s=stage(),m=1+(S.buildings.forge-1)*.07,a=Math.floor(s.scrap*m),c=Math.floor(s.cells*m),be=s.beacon;S.scrap+=a;S.cells+=c;S.beacon+=be;const last=S.chapter===30;if(!last)S.chapter++;S.tactical=blankTactical();save();render();loot(last?'黑塔已靜默':'十波敵潮已守住！',[`▰ ${a}`,`▱ ${c}`,`◉ ${be}`],'V7 FIELD DOSSIER CLEARED')}
function retreat(){const s=stage(),a=Math.floor(s.scrap*.18);S.scrap+=a;S.tactical=blankTactical();save();render();loot('塔芯熄火，暫時撤退',[`▰ ${a}`],'CORE BREACHED')}
function selectUnitSkill(slot){const t=S.tactical,u=t.formation[slot];if(t.phase!=='live'||!u)return;const p=skillProfile(u.id),now=Date.now();if(now<u.readyAt){announce(`技能仍需 ${Math.ceil((u.readyAt-now)/1000)} 秒冷卻。`);return}if(t.command<p.cost){announce('指令能量不足。');return}t.aim=t.aim?.slot===slot?null:{slot};render()}
function targetAt(x,y){const t=S.tactical;if(t.phase!=='live'||!t.aim)return false;const u=t.formation[t.aim.slot];if(!u)return false;const p=skillProfile(u.id),now=Date.now();if(now<u.readyAt||t.command<p.cost)return false;x=Math.max(.04,Math.min(.96,Number(x)||.5));y=Math.max(.08,Math.min(.78,Number(y)||.46));t.reticle={x,y};t.command-=p.cost;u.readyAt=now+p.cool*t.perks.cooldown;const damage=Math.max(12,unitPower(u.id)*p.damage*(1+(u.rank-1)*.22)*t.perks.damage);let hits=0;t.enemies.forEach(e=>{const ey=.08+e.pos*.7,dist=Math.hypot((e.x-x)*.78,ey-y);if(dist<=p.radius){e.hp-=damage;if(p.slow)e.slowUntil=now+p.slow*t.perks.slow;hits++}});if(p.repair)t.core=Math.min(100,t.core+p.repair);t.flash={x,y,until:now+430};tacticalLog(`${byId[u.id].name} 發動${p.name}：命中 ${hits} 個熱源${p.repair?`，塔芯 +${p.repair}%`:''}。`);t.aim=null;collectDefeated();render();return true}
function summonUnit(){const t=S.tactical;if(!['live','intermission'].includes(t.phase)||t.coins<t.summonCost)return false;prepareFormation(t);const costNow=t.summonCost,id=S.team[t.summoned%S.team.length],empty=t.formation.findIndex(x=>!x);t.coins-=costNow;t.summoned++;t.summonCost=Math.floor(costNow*1.28+4);if(empty>-1){t.formation[empty]={id,rank:1,readyAt:0,nextShot:0};tacticalLog(`${byId[id].name} 進入第 ${empty+1} 火線位。`)}else{const candidates=t.formation.map((u,i)=>({u,i})).filter(x=>x.u.rank<5).sort((a,b)=>a.u.rank-b.u.rank);if(!candidates.length){t.coins+=costNow;announce('火線已全部升至上限。');return false}const pick=candidates.find(x=>x.u.id===id)||candidates[0];pick.u.rank++;pick.u.readyAt=Math.min(pick.u.readyAt,Date.now()+1200);tacticalLog(`${byId[pick.u.id].name} 同頻增幅，升至 ${pick.u.rank} 階。`)}render();return true}
function calibrate(){const t=S.tactical;if(!['live','intermission'].includes(t.phase)||t.coins<t.calibrateCost)return false;t.coins-=t.calibrateCost;t.calibration++;t.perks.damage*=1.12;t.calibrateCost=Math.floor(t.calibrateCost*1.42+5);tacticalLog(`全體火力重新校準：+${t.calibration*12}%。`);render();return true}
function repair(){const t=S.tactical;if(!['live','intermission','upgrade'].includes(t.phase)||S.cells<14||t.core>=100)return;S.cells-=14;t.core=Math.min(100,t.core+18);tacticalLog('技師補上塔芯護板，耐久 +18%。');render()}
function offerUpgrade(){const t=S.tactical,ids=Object.keys(upgradeDefs),start=(t.wave*2)%ids.length;t.phase='upgrade';t.aim=null;t.upgradeChoices=[0,1,2].map(i=>ids[(start+i)%ids.length]);tacticalLog('敵潮暫歇：截獲三段戰術頻率，必須擇一。');render()}
function chooseUpgrade(id){const t=S.tactical;if(t.phase!=='upgrade'||!t.upgradeChoices.includes(id))return;switch(id){case'overclock':t.perks.damage*=1.25;break;case'cooling':t.perks.cooldown*=.8;break;case'salvage':t.perks.coin*=1.4;break;case'barrier':t.core=Math.min(100,t.core+24);break;case'shock':t.perks.slow*=1.5;break;case'command':t.maxCommand++;t.command=Math.min(t.maxCommand,t.command+2);break}tacticalLog(`已套用「${upgradeDefs[id].name}」。`);t.upgradeChoices=[];t.phase='intermission';t.nextWaveAt=Date.now()+1300;render()}
function tickBattle(){const t=S.tactical,now=Date.now();if(t.phase==='intermission'){if(now>=t.nextWaveAt)launchWave();return}if(t.phase!=='live')return;const dt=Math.min(.28,Math.max(.02,(now-t.lastTick)/1000));t.lastTick=now;t.command=Math.min(t.maxCommand,t.command+dt*.035);if(t.spawned<t.total&&now>=t.spawnAt){spawnEnemy();t.spawnAt=now+720-Math.min(230,t.wave*18)}t.formation.forEach((u,i)=>{if(!u||now<u.nextShot)return;const ux=(i+.5)/7,target=t.enemies.filter(e=>Math.abs(e.x-ux)<.44).sort((a,b)=>b.pos-a.pos)[0];if(!target)return;target.hp-=Math.max(5,unitPower(u.id)*(.18+u.rank*.045)*t.perks.damage);u.nextShot=now+Math.max(430,920-u.rank*65)});collectDefeated();t.enemies.forEach(e=>{e.pos+=e.speed*dt*(now<e.slowUntil?.38:1);if(e.pos>=1){t.core-=e.damage;e.hp=0;tacticalLog(`熱源撞上塔牆，塔芯 -${e.damage}%。`)}});t.enemies=t.enemies.filter(e=>e.hp>0);if(t.core<=0){t.core=0;t.phase='breach';render();setTimeout(retreat,420);return}if(t.spawned===t.total&&!t.enemies.length){if(t.wave>=t.waves){t.phase='clear';render();setTimeout(resolveTactical,480)}else if([3,6,9].includes(t.wave))offerUpgrade();else{t.phase='intermission';t.nextWaveAt=now+1600;tacticalLog(`第 ${t.wave} 波淨空；補給決策後自動接戰。`);render()}}else renderBattleFrame()}
function reset(){modal.innerHTML='<section class="modal-box"><div class="label">DANGER ZONE</div><h2>重置本機存檔？</h2><p class="sub">這會清除目前的角色、資源與關卡進度，無法復原。</p><button class="button rust" data-act="confirmReset">確定重置</button><button class="button" data-act="close">取消</button></section>';modal.hidden=false}
document.addEventListener('click',e=>{const b=e.target.closest('button');if(!b||b.disabled)return;if(b.dataset.tab){S.tab=b.dataset.tab;save();render();return}const a=b.dataset.act;if(a==='idle')claimIdle();else if(a==='chest')chest();else if(a==='building')upgradeBuilding(b.dataset.id);else if(a==='team')team(b.dataset.id);else if(a==='hero')upgradeHero(b.dataset.id);else if(a==='star')star(b.dataset.id);else if(a==='draw')draw(Number(b.dataset.count));else if(a==='battle')beginBattle();else if(a==='target-skill')selectUnitSkill(Number(b.dataset.slot));else if(a==='battlefield'){const r=b.getBoundingClientRect();targetAt((e.clientX-r.left)/r.width,(e.clientY-r.top)/r.height)}else if(a==='summon')summonUnit();else if(a==='calibrate')calibrate();else if(a==='upgrade')chooseUpgrade(b.dataset.id);else if(a==='repair')repair();else if(a==='reset')reset();else if(a==='confirmReset'){try{localStorage.removeItem(KEY);localStorage.removeItem(LEGACY6);localStorage.removeItem(LEGACY5);localStorage.removeItem(LEGACY4)}catch{}S=fresh();save();modal.hidden=true;render();announce('新的頻率已建立。')}else if(a==='close')modal.hidden=true;});
document.addEventListener('pointermove',e=>{const field=e.target.closest?.('.enemy-field'),t=S.tactical;if(!field||!t.aim)return;const r=field.getBoundingClientRect();t.reticle={x:Math.max(.04,Math.min(.96,(e.clientX-r.left)/r.width)),y:Math.max(.08,Math.min(.78,(e.clientY-r.top)/r.height))};const ret=$('.target-reticle');if(ret){ret.style.left=`${t.reticle.x*100}%`;ret.style.top=`${t.reticle.y*100}%`}field.parentElement.style.setProperty('--aim-x',`${t.reticle.x*100}%`);field.parentElement.style.setProperty('--aim-y',`${t.reticle.y*100}%`)});
document.addEventListener('keydown',e=>{const t=S.tactical;if(!t.aim)return;if(e.key==='Escape'){t.aim=null;render();return}const step=.035,move={ArrowLeft:[-step,0],ArrowRight:[step,0],ArrowUp:[0,-step],ArrowDown:[0,step]}[e.key];if(move){e.preventDefault();t.reticle={x:Math.max(.04,Math.min(.96,t.reticle.x+move[0])),y:Math.max(.08,Math.min(.78,t.reticle.y+move[1]))};render()}else if(e.key==='Enter'){e.preventDefault();targetAt(t.reticle.x,t.reticle.y)}});
function threatInfo(t){if(!t.enemies.length)return{label:t.phase==='live'?'遠端接觸':'掃描待命',eta:'--',pressure:0};const closest=t.enemies.reduce((a,b)=>a.pos>b.pos?a:b),eta=Math.max(0,(1-closest.pos)/(closest.speed*(Date.now()<closest.slowUntil?.38:1)));return{label:closest.kind==='brute'?'重裝熱源逼近':'最近熱源逼近',eta:`${eta.toFixed(1)}s`,pressure:Math.max(4,Math.min(100,closest.pos*100))}}
const campaignViewV5=campaignView;campaignView=function(){const t=S.tactical,s=stage(),protocol=crewProtocol();prepareFormation(t);const phaseText={briefing:'整備',live:'交戰中',intermission:'下一波接近',upgrade:'選擇強化',breach:'核心遭突破',clear:'區域淨空'}[t.phase]||'待命',aim=t.aim?`--aim-x:${t.reticle.x*100}%;--aim-y:${t.reticle.y*100}%`:'',threat=threatInfo(t);const fieldButton=t.phase==='briefing'?`<button class="button rust" data-act="battle">接通誘餌，開始 10 波守夜<b>之後敵潮自動推進</b></button>`:`<button class="button green" data-act="repair" ${t.phase==='breach'||S.cells<14||t.core>=100?'disabled':''}>補修塔芯　▱ 14<b>立即回復 18%</b></button>`;return `<section class="view ${S.tab==='campaign'?'active':''}"><section class="battle-console"><header class="battle-header"><div class="label">ROLE TACTICS // v7</div><h1 class="stage-title">${s.name}</h1><p class="sub">角色班位改變普攻、技能範圍與冷卻；職能組合會啟動一項小隊協定。</p><div class="combat-status"><span>波次 ${t.wave}/${t.waves}・${phaseText}</span><span>零件 ${Math.floor(t.coins)}</span><span class="${t.core>35?'core-readout':'danger-readout'}">塔芯 ${Math.max(0,Math.round(t.core))}%</span></div><div class="wave-track">${Array.from({length:10},(_,i)=>`<i class="${i<t.wave?'done':''} ${i===t.wave-1&&t.phase==='live'?'now':''}"></i>`).join('')}</div><div class="threat-readout" aria-live="off"><span>${threat.label}</span><b>預估接觸 ${threat.eta}</b><span class="threat-meter"><i style="width:${threat.pressure}%"></i></span></div></header><div class="battlefield ${t.aim?'aiming':''}" style="${aim}" aria-label="單一縱深角色戰術戰場"><div class="terrain" aria-hidden="true"></div>${t.enemies.map(enemyMarkup).join('')}<button class="field-input enemy-field" data-act="battlefield" aria-label="${t.aim?'選擇技能落點':'敵潮推進區'}"></button>${t.aim?`<span class="target-reticle" style="left:${t.reticle.x*100}%;top:${t.reticle.y*100}%"></span>`:''}${t.flash&&Date.now()<t.flash.until?`<span class="impact" style="left:${t.flash.x*100}%;top:${t.flash.y*100}%"></span>`:''}${t.phase==='intermission'?'<span class="intermission const renderBattleFrameV5=renderBattleFrame;renderBattleFrame=function(){if(S.tab!=='campaign')return;renderBattleFrameV5();const root=document.querySelector('.view.active .battle-console');if(!root)return;const t=S.tactical,threat=threatInfo(t),readout=root.querySelector('.threat-readout');if(readout){readout.children[0].textContent=threat.label;readout.children[1].textContent=`預估接觸 ${threat.eta}`;readout.querySelector('i').style.width=`${threat.pressure}%`}root.querySelectorAll('.unit-card').forEach(b=>{const u=t.formation[Number(b.dataset.slot)];if(!u)return;const p=skillProfile(u.id,u.duty),left=Math.max(0,u.readyAt-Date.now());b.querySelector('small').textContent=left>0?Math.ceil(left/1000):p.name;b.setAttribute('aria-label',`${byId[u.id].name}，${dutyDefs[u.duty??1].name}，${p.name}${left>0?`，冷卻 ${Math.ceil(left/1000)} 秒`:'，可施放'}`)})}

collectDefeated=function(){const t=S.tactical,dead=t.enemies.filter(e=>e.hp<=0),p=crewProtocol();if(!dead.length)return;dead.forEach(e=>{t.coins+=Math.round(e.bounty*t.perks.coin*p.coin);t.command=Math.min(t.maxCommand,t.command+(e.kind==='brute'?.75:.24));t.kills=(t.kills||0)+1;pushFx({type:'death',x:e.x,y:.08+e.pos*.7,color:'#c25d42'})});t.enemies=t.enemies.filter(e=>e.hp>0)}
selectUnitSkill=function(slot){const t=S.tactical,u=t.formation[slot];if(t.phase!=='live'||!u)return;const p=skillProfile(u.id,u.duty),now=Date.now();if(now<u.readyAt){announce(`技能仍需 ${Math.ceil((u.readyAt-now)/1000)} 秒冷卻。`);return}if(t.command<p.cost){announce('指令能量不足。');return}t.aim=t.aim?.slot===slot?null:{slot};render()}
targetAt=function(x,y){const t=S.tactical;if(t.phase!=='live'||!t.aim)return false;const u=t.formation[t.aim.slot];if(!u)return false;const p=skillProfile(u.id,u.duty),now=Date.now();if(now<u.readyAt||t.command<p.cost)return false;x=Math.max(.04,Math.min(.96,Number(x)||.5));y=Math.max(.08,Math.min(.78,Number(y)||.46));t.reticle={x,y};t.command-=p.cost;u.readyAt=now+p.cool*t.perks.cooldown;const damage=Math.max(12,unitPower(u.id)*p.damage*(1+(u.rank-1)*.22)*t.perks.damage);let hits=0;t.enemies.forEach(e=>{const ey=.08+e.pos*.7,dist=Math.hypot((e.x-x)*.78,ey-y);if(dist<=p.radius){e.hp-=damage;if(p.slow)e.slowUntil=now+p.slow*t.perks.slow;hits++}});if(p.repair)t.core=Math.min(100,t.core+p.repair);const rcol=disciplineColor[byId[u.id].discipline]||'#efb34b';pushFx({type:'ring',x,y,color:rcol});t.flash={x,y,until:now+430};tacticalLog(`${byId[u.id].name}於${dutyDefs[u.duty??1].name}發動${p.name}：命中 ${hits} 個熱源${p.repair?`，塔芯 +${Math.round(p.repair)}%`:''}。`);t.aim=null;collectDefeated();render();return true}
summonUnit=function(){const t=S.tactical;if(!['live','intermission'].includes(t.phase)||t.coins<t.summonCost)return false;prepareFormation(t);const costNow=t.summonCost,duty=t.summoned%S.team.length,id=S.team[duty],empty=t.formation.findIndex(x=>!x);t.coins-=costNow;t.summoned++;t.summonCost=Math.floor(costNow*1.28+4);if(empty>-1){t.formation[empty]={id,duty,rank:1,readyAt:0,nextShot:0};tacticalLog(`${byId[id].name} 進入第 ${empty+1} 火線位，沿用${dutyDefs[duty].name}加成。`)}else{const candidates=t.formation.map((u,i)=>({u,i})).filter(x=>x.u.rank<5).sort((a,b)=>a.u.rank-b.u.rank);if(!candidates.length){t.coins+=costNow;announce('火線已全部升至上限。');return false}const pick=candidates.find(x=>x.u.id===id)||candidates[0];pick.u.rank++;pick.u.readyAt=Math.min(pick.u.readyAt,Date.now()+1200);tacticalLog(`${byId[pick.u.id].name} 同頻增幅，升至 ${pick.u.rank} 階。`)}render();return true}
tickBattle=function(){const t=S.tactical,now=Date.now();if(t.phase==='intermission'){if(now>=t.nextWaveAt)launchWave();return}if(t.phase!=='live')return;const dt=Math.min(.28,Math.max(.02,(now-t.lastTick)/1000)),protocol=crewProtocol();t.lastTick=now;t.command=Math.min(t.maxCommand,t.command+dt*.035*protocol.command);if(t.spawned<t.total&&now>=t.spawnAt){spawnEnemy();t.spawnAt=now+720-Math.min(230,t.wave*18)}t.formation.forEach((u,i)=>{if(!u||now<u.nextShot)return;const ux=(i+.5)/7,target=t.enemies.filter(e=>Math.abs(e.x-ux)<.44).sort((a,b)=>b.pos-a.pos)[0];if(!target)return;const dmg=Math.max(5,battleUnitPower(u,target)*(.18+u.rank*.045)*t.perks.damage);target.hp-=dmg;u.nextShot=now+Math.max(430,920-u.rank*65);u._fireAt=now;const fcol=disciplineColor[byId[u.id].discipline]||'#efb34b',tx=target.x,ty=.08+target.pos*.7;pushFx({type:'tracer',x1:ux,y1:.9,x2:tx,y2:ty,color:fcol});pushFx({type:'muzzle',x:ux,y:.9,color:fcol});pushFx({type:'hit',x:tx,y:ty});spawnSparks(tx,ty,fcol)});collectDefeated();t.enemies.forEach(e=>{e.pos+=e.speed*dt*(now<e.slowUntil?.38:1);if(e.pos>=1){t.core-=e.damage;e.hp=0;tacticalLog(`熱源撞上塔牆，塔芯 -${e.damage}%。`)}});t.enemies=t.enemies.filter(e=>e.hp>0);if(t.core<=0){t.core=0;t.phase='breach';render();setTimeout(retreat,420);return}if(t.spawned===t.total&&!t.enemies.length){if(t.wave>=t.waves){t.phase='clear';render();setTimeout(resolveTactical,480)}else if([3,6,9].includes(t.wave))offerUpgrade();else{t.phase='intermission';t.nextWaveAt=now+1600;tacticalLog(`第 ${t.wave} 波淨空；補給決策後自動接戰。`);render()}}else renderBattleFrame()}
heroCard=function(id){const h=byId[id],o=S.owned[id],inTeam=S.team.includes(id),hc=heroCost(id),sc=starCost(id),atk=unitPower(id);return `<article class="hero rarity-${h.rarity} discipline-${h.discipline}"><div class="portrait">${portraitFor(id)?`<img src="${portraitFor(id)}" alt="" loading="lazy">`:h.mark}</div><div><h3>${h.name} <span class="utility">${h.rarity}・${h.role}・${disciplineNames[h.discipline]}</span></h3><div class="meta">Lv.${o.lv}　★${o.star}　戰力 ${atk}</div><span class="trait">${h.trait}｜${h.traitDesc}</span><div class="meta">碎片 ${o.frag}/${sc}</div></div><div class="actions"><button class="button" data-act="team" data-id="${id}">${inTeam?'撤下':'上陣'}</button><button class="button" data-act="hero" data-id="${id}" ${S.scrap<hc?'disabled':''}>升級 ${fmt(hc)}</button><button class="button" data-act="star" data-id="${id}" ${o.frag<sc?'disabled':''}>升星 ${sc}</button></div></article>`}
heroesView=function(){const owned=Object.keys(S.owned).sort((a,b)=>heroes.indexOf(byId[b])-heroes.indexOf(byId[a])),protocol=crewProtocol();return `<section class="view ${S.tab==='heroes'?'active':''}"><section class="panel"><div class="label">WATCH CREW // ROLE BOARD</div><h1 class="stage-title">安排三個守夜班位。</h1><p class="sub">同一名角色放在不同班位會改變普攻、技能範圍或冷卻。使用箭頭調整順序。</p><div class="duty-board">${S.team.map((id,i)=>{const h=byId[id],d=dutyDefs[i];return `<article class="duty-card discipline-${h.discipline}"><div class="portrait">${portraitFor(id)?`<img src="${portraitFor(id)}" alt="" loading="lazy">`:h.mark}</div><div><h3>${i+1}｜${d.name}・${h.name}</h3><p>${d.desc}　${disciplineNames[h.discipline]}職能</p></div><div class="duty-actions"><button class="button" data-act="duty" data-index="${i}" data-delta="-1" ${i===0?'disabled':''} aria-label="${h.name}往前一個班位">↑</button><button class="button" data-act="duty" data-index="${i}" data-delta="1" ${i===S.team.length-1?'disabled':''} aria-label="${h.name}往後一個班位">↓</button></div></article>`}).join('')}</div><div class="protocol"><b>${protocol.name}</b><small>${protocol.desc}</small></div><div class="role-key"><span class="discipline-assault">火力</span><span class="discipline-control">控場</span><span class="discipline-support">後勤</span></div></section><section class="panel"><div class="panel-head"><b>已接入頻道的倖存者</b><span class="utility">${owned.length}/12</span></div><div class="heroes">${owned.map(heroCard).join('')}</div></section></section>`}
function shiftDuty(index,delta){const next=index+delta;if(index<0||next<0||index>=S.team.length||next>=S.team.length)return;[S.team[index],S.team[next]]=[S.team[next],S.team[index]];S.tactical=blankTactical();save();render();announce('守夜班位已重新排定。')}
document.addEventListener('click',e=>{const b=e.target.closest('button[data-act="duty"]');if(b&&!b.disabled)shiftDuty(Number(b.dataset.index),Number(b.dataset.delta))});
window.__watchtower={reset:()=>{S=fresh();save();render()},state:()=>JSON.parse(JSON.stringify(S)),key:KEY,startBattle:beginBattle,tick:tickBattle,forceUpgrade:()=>{prepareFormation(S.tactical);S.tactical.wave=3;offerUpgrade()},selectUnitSkill,targetAt,summon:summonUnit,calibrate,protocol:crewProtocol,shiftDuty};render();setInterval(tickBattle,180);window.addEventListener('beforeunload',save);
})();
</script>
